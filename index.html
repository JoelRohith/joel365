<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joel's 365-Day Master System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#07101f;--navy2:#0d1b2e;--navy3:#122240;
  --gold:#f5a623;--gold2:#e8950f;--gold3:#ffd580;
  --emerald:#10b981;--crimson:#ef4444;
  --sky:#3b82f6;--violet:#8b5cf6;--amber:#f59e0b;
  --card:#0f1f35;--card2:#162840;
  --border:rgba(245,166,35,0.15);
  --text:#e8eaf0;--muted:#8a9ab5;
  --sw:270px;
}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--navy);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--navy2)}
::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:3px}

/* particles */
#ptcl{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;border-radius:50%;animation:fup linear infinite;opacity:0}
@keyframes fup{0%{transform:translateY(100vh) scale(0);opacity:0}15%{opacity:.5}85%{opacity:.2}100%{transform:translateY(-5vh) scale(1);opacity:0}}

/* sidebar */
#sb{position:fixed;left:0;top:0;height:100vh;width:var(--sw);background:linear-gradient(180deg,#061525,#0a1e38 50%,#06121e);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden}
#sb.hide{transform:translateX(-100%)}
.sb-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo h1{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);letter-spacing:1.5px;line-height:1.4}
.sb-logo p{font-size:.7rem;color:var(--muted);margin-top:3px;font-family:'Rajdhani'}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-sec{padding:8px 18px 2px;font-size:.62rem;color:rgba(138,154,181,.5);font-family:'Rajdhani';letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.sb-a{display:flex;align-items:center;gap:10px;padding:9px 18px;color:var(--muted);text-decoration:none;font-family:'Rajdhani';font-size:.92rem;font-weight:500;transition:all .2s;border-left:3px solid transparent;cursor:pointer;white-space:nowrap}
.sb-a:hover{color:var(--text);background:rgba(245,166,35,.05)}
.sb-a.act{color:var(--gold);background:rgba(245,166,35,.1);border-left-color:var(--gold)}
.sb-a .ico{width:20px;text-align:center;font-size:.95rem;flex-shrink:0}
.sb-foot{padding:14px 18px;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted);flex-shrink:0}

/* topbar */
#tb{position:fixed;top:0;left:var(--sw);right:0;height:52px;background:rgba(7,16,31,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:99;display:flex;align-items:center;padding:0 20px;gap:14px;transition:left .3s cubic-bezier(.4,0,.2,1)}
#tb.full{left:0}
.mbtn{background:none;border:none;color:var(--gold);font-size:1.15rem;cursor:pointer;padding:4px;transition:transform .2s;flex-shrink:0}
.mbtn:hover{transform:scale(1.1)}
#tb-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold3);font-weight:500}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:12px}
.day-bdg{background:linear-gradient(135deg,var(--gold2),var(--amber));color:#000;font-family:'Rajdhani';font-size:.82rem;font-weight:700;padding:3px 10px;border-radius:20px}

/* main */
#main{margin-left:var(--sw);margin-top:52px;min-height:calc(100vh - 52px);transition:margin-left .3s cubic-bezier(.4,0,.2,1);position:relative;z-index:1}
#main.full{margin-left:0}

/* page anim */
.pg{animation:pin .35s cubic-bezier(.4,0,.2,1)}
@keyframes pin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* hero */
.hero{position:relative;min-height:200px;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.22) saturate(1.4)}
.hero-ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(7,16,31,.92) 0%,rgba(16,40,64,.65) 60%,rgba(7,16,31,.92))}
.hero-c{position:relative;z-index:2;padding:44px 40px}
.hero-ey{font-family:'Rajdhani';font-size:.82rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.hero-h{font-family:'Cinzel',serif;font-size:clamp(1.5rem,3.5vw,2.6rem);font-weight:900;color:#fff;line-height:1.2;margin-bottom:12px}
.hero-h span{color:var(--gold)}
.hero-sub{font-size:.9rem;color:var(--muted);max-width:480px;line-height:1.7;margin-bottom:24px}
.hero-stats{display:flex;gap:28px;flex-wrap:wrap}
.hst-v{font-family:'Cinzel',serif;font-size:1.9rem;color:var(--gold);font-weight:700;line-height:1}
.hst-l{font-size:.7rem;color:var(--muted);font-family:'Rajdhani';text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* cards grid */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;padding:24px 28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .3s,box-shadow .3s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(245,166,35,.1)}
.card img{width:100%;height:145px;object-fit:cover;filter:brightness(.8)}
.card-b{padding:16px}
.card-ico{font-size:1.3rem;margin-bottom:7px}
.card-t{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold);margin-bottom:5px}
.card-d{font-size:.78rem;color:var(--muted);line-height:1.5}
.prog-bar{margin-top:10px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold2),var(--emerald));transition:width 1.2s ease}

/* section header */
.sh{padding:24px 28px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sh h2{font-family:'Cinzel',serif;font-size:1.25rem;color:var(--gold)}

/* badge */
.bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.72rem;font-family:'Rajdhani';font-weight:600}
.bdg-g{background:rgba(245,166,35,.12);color:var(--gold);border:1px solid rgba(245,166,35,.28)}
.bdg-em{background:rgba(16,185,129,.12);color:var(--emerald);border:1px solid rgba(16,185,129,.28)}
.bdg-r{background:rgba(239,68,68,.12);color:var(--crimson);border:1px solid rgba(239,68,68,.28)}
.bdg-b{background:rgba(59,130,246,.12);color:var(--sky);border:1px solid rgba(59,130,246,.28)}
.bdg-v{background:rgba(139,92,246,.12);color:var(--violet);border:1px solid rgba(139,92,246,.28)}
.bdg-a{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.28)}

/* divider */
.div-g{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:8px 28px}

/* table */
.twrap{padding:16px 28px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--card2);color:var(--gold);font-family:'Rajdhani';font-weight:600;padding:9px 12px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;font-size:.78rem;letter-spacing:.4px}
td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);vertical-align:middle}
tr:hover td{background:rgba(245,166,35,.025)}
.ot-r td{border-left:3px solid var(--amber)}
.nt-r td{border-left:3px solid var(--sky)}
.mix-r td{border-left:3px solid var(--violet)}

/* checkbox */
.cb-w{text-align:center}
.cb{width:22px;height:22px;border:2px solid rgba(255,255,255,.2);border-radius:6px;background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;font-size:.8rem;color:transparent;user-select:none}
.cb:hover{border-color:var(--emerald)}
.cb.on{background:var(--emerald);border-color:var(--emerald);color:#fff;animation:pop .22s ease}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}

/* input */
.inp{background:var(--card2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 10px;font-family:'Nunito';font-size:.8rem;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}

/* pagination */
.pag{display:flex;align-items:center;justify-content:center;gap:7px;padding:18px;flex-wrap:wrap}
.pg-b{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:7px;cursor:pointer;font-family:'Rajdhani';transition:all .2s;font-size:.82rem}
.pg-b:hover{background:var(--gold2);color:#000;border-color:var(--gold)}
.pg-b.cur{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.pg-b:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}

/* meal cards */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding:18px 28px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .3s,box-shadow .3s}
.mc:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.4)}
.mc img{width:100%;height:170px;object-fit:cover}
.mc-b{padding:16px}
.mc-t{font-family:'Rajdhani';font-size:.75rem;letter-spacing:1px;text-transform:uppercase}
.mc-n{font-family:'Cinzel',serif;font-size:.92rem;color:var(--text);margin:4px 0 8px}
.mc-i{font-size:.78rem;color:var(--muted);line-height:1.65;white-space:pre-line}
.cal-b{display:inline-flex;align-items:center;gap:5px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:20px;padding:2px 9px;font-size:.72rem;color:var(--gold);margin-top:9px;font-family:'Rajdhani'}

/* timeline */
.tl{padding:24px 28px;position:relative}
.tl::before{content:'';position:absolute;left:48px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),var(--emerald),var(--sky))}
.tl-i{display:flex;gap:20px;margin-bottom:30px}
.tl-ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;z-index:1;margin-top:4px;border:2px solid currentColor}
.tl-bdy{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;transition:transform .25s}
.tl-bdy:hover{transform:translateX(4px)}

/* phase cards */
.phgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;padding:18px 28px}
.ph-c{border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:transform .3s}
.ph-c:hover{transform:translateY(-4px)}

/* food grid */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:16px 28px}
.fc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px;transition:transform .2s,box-shadow .2s}
.fc:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.3)}

/* hair oil steps */
.oil-w{padding:14px 28px}
.oil-s{display:flex;gap:14px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:10px;transition:transform .2s}
.oil-s:hover{transform:translateX(4px)}
.oil-n{width:30px;height:30px;border-radius:50%;background:var(--gold2);color:#000;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:.85rem;flex-shrink:0;margin-top:2px}

/* quote cards */
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;padding:18px 28px}
.qc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;position:relative;overflow:hidden;transition:transform .3s}
.qc:hover{transform:translateY(-4px)}
.qc::before{content:'"';position:absolute;top:-14px;left:14px;font-size:7rem;color:rgba(245,166,35,.05);font-family:'Cinzel',serif;line-height:1}

/* trigger cards */
.trc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:12px;transition:transform .2s}
.trc:hover{transform:translateX(4px)}

/* hair week */
.hwk{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;padding:14px 28px}
.hwd{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 10px;text-align:center;transition:transform .2s}
.hwd:hover{transform:translateY(-3px)}
.hwd.sp{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.04)}

/* info banner */
.info-b{margin:16px 28px;padding:14px 18px;background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.22);border-radius:11px}

/* today checklist */
.tc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px;margin-top:14px}
.tc-item{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px;cursor:pointer;transition:all .2s;user-select:none}
.tc-item:hover{border-color:rgba(245,166,35,.3)}
.tc-item.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.28)}
.tc-item.done span{color:var(--emerald)}

/* chart */
.ch-wrap{padding:20px 28px}
.ch-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}

/* mca grid */
.mcagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding:18px 28px}
.mcac{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .3s,box-shadow .3s}
.mcac:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.4)}

/* responsive */
@media(max-width:768px){
  :root{--sw:255px}
  #sb{transform:translateX(-100%)}
  #sb.open{transform:translateX(0)}
  #main,#tb{margin-left:0!important;left:0!important}
  .hwk{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .cgrid,.mgrid,.phgrid,.fgrid,.mcagrid{grid-template-columns:1fr}
  .hero-c{padding:28px 20px}
}
</style>
</head>

<!-- SIDEBAR -->

  <div class="sb-logo">
    <h1>JOEL&#x27;S 365<br>MASTER SYSTEM</h1>

  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-foot">

</nav>

</div>

<!-- MAIN -->
<main id="main"></main>

const $ = id => document.getElementById(id);
const qs = s => document.querySelector(s);
const START = new Date('2026-03-20');

function getDayNum(){
  const now=new Date(); const diff=Math.floor((now-START)/86400000)+1;
  return Math.max(1,Math.min(365,diff));
}

function todayDate(){ return ALL_DATES[Math.min(getDayNum()-1,364)]; }

// ── Storage ────────────────────────────────────────────────────────────────
function lsGet(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }

let DATA = lsGet('joel_v3') || {daily:{},bible:{},weight:{},weekly:{},hair:{}};
function save(){ lsSet('joel_v3',DATA); }

// ── Build Sidebar ──────────────────────────────────────────────────────────
function buildSidebar(activePage){
  const nav=$('sb-nav'); nav.innerHTML='';
  NAV.forEach(item=>{
    if(item.sec){
      const d=document.createElement('div');
      d.className='sb-sec'; d.textContent=item.sec;
      nav.appendChild(d);
    } else {
      const a=document.createElement('div');
      a.className='sb-a'+(activePage===item.id?' act':'');
      a.innerHTML=`<span class="ico"><i class="fas ${item.ico}"></i></span>${item.lbl}`;
      a.onclick=()=>goto(item.id);
      nav.appendChild(a);
    }
  });
  const dn=getDayNum();
  $('sb-day').textContent='Day '+dn+' of 365';
  $('tb-day').textContent='Day '+dn;
}

// ── Router ─────────────────────────────────────────────────────────────────
let curPage='dashboard';
function goto(page){
  curPage=page;
  $('tb-title').textContent=PAGE_TITLES[page]||page;
  buildSidebar(page);
  if(window.innerWidth<768) $('sb').classList.remove('open');
  renderPage(page);
  window.scrollTo(0,0);
}

function renderPage(page){
  const main=$('main'); main.innerHTML='';
  const div=document.createElement('div');
  div.className='pg';
  switch(page){
    case 'dashboard': div.innerHTML=pageDashboard(); break;
    case 'daily':     div.innerHTML=pageDaily(); break;
    case 'career':    div.innerHTML=pageCareer(); break;
    case 'diet':      div.innerHTML=pageDiet(); break;
    case 'workout':   div.innerHTML=pageWorkout(); break;
    case 'weight':    div.innerHTML=pageWeight(); break;
    case 'mca':       div.innerHTML=pageMCA(); break;
    case 'bible':     div.innerHTML=pageBible(0); break;
    case 'hm':        div.innerHTML=pageHM(); break;
    case 'hair':      div.innerHTML=pageHair(); break;
    case 'weekly':    div.innerHTML=pageWeekly(0); break;
    case 'spiritual': div.innerHTML=pageSpiritual(0); break;
    case 'motivation':div.innerHTML=pageMotivation(); break;
  }
  main.appendChild(div);
  afterRender(page);
}

function afterRender(page){
  // Wire up interactive elements after DOM is inserted
  qsAll('.go-page').forEach(el=>el.addEventListener('click',()=>goto(el.dataset.page)));
  if(page==='dashboard') wireDashboard();
  if(page==='daily') wireDaily();
  if(page==='weight') wireWeight();
  if(page==='bible') wireBible();
  if(page==='spiritual') wireSpiritual();
  if(page==='weekly') wireWeekly();
}

function qsAll(sel){ return Array.from(document.querySelectorAll(sel)); }

// ── Hero builder ───────────────────────────────────────────────────────────
function hero(eyebrow,title,sub,imgUrl,statsHtml='',minH='200px'){
  return `<div class="hero" style="min-height:${minH}">
    <div class="hero-bg" style="background-image:url('${imgUrl}')"></div>
    <div class="hero-ov"></div>
    <div class="hero-c">
      <div class="hero-ey">${eyebrow}</div>
      <div class="hero-h">${title}</div>
      ${sub?`<div class="hero-sub">${sub}</div>`:''}
      ${statsHtml?`<div class="hero-stats">${statsHtml}</div>`:''}
    </div>
  </div>`;
}
function hstat(val,lbl){ return `<div><div class="hst-v">${val}</div><div class="hst-l">${lbl}</div></div>`; }

let dailyWeek=0;
function pageDaily(week){
  if(week!==undefined) dailyWeek=week;
  const dn=getDayNum(); const totalW=Math.ceil(365/7);
  const wStart=dailyWeek*7; const wDates=ALL_DATES.slice(wStart,wStart+7);
  const today=todayDate();
  let rows='';
  wDates.forEach(date=>{
    const d=DATA.daily[date]||{}; const isToday=date===today;
    const sc=DAILY_TASKS.filter(t=>d[t.k]).length;
    const scCol=sc>=8?'var(--emerald)':sc>=5?'var(--amber)':'var(--crimson)';
    let cbs='';
    DAILY_TASKS.forEach(t=>{
      cbs+=`<td class="cb-w"><div class="cb${d[t.k]?' on':''}" data-date="${date}" data-key="${t.k}">&#10003;</div></td>`;
    });
    rows+=`<tr style="${isToday?'background:rgba(245,166,35,.05);outline:1px solid rgba(245,166,35,.2)':''}">
      <td style="font-family:'Rajdhani';font-weight:600;white-space:nowrap;color:${isToday?'var(--gold)':'var(--text)'}">
        ${isToday?'<span style="color:var(--gold)">&#9679; </span>':''}${date}
      </td>
      ${cbs}
      <td><span style="font-family:'Cinzel',serif;color:${scCol};font-weight:700">${sc}/${DAILY_TASKS.length}</span></td>
      <td><input class="inp daily-note" data-date="${date}" style="min-width:130px" placeholder="Note…" value="${(d.note||'').replace(/"/g,'&quot;')}"></td>
    </tr>`;
  });
  let thCbs=''; DAILY_TASKS.forEach(t=>{ thCbs+=`<th>${t.lbl.split(' ')[0]}</th>`; });
  return hero('Track Every Day','Daily <span>Discipline</span> Tracker','',
    'https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=1200&q=80','','160px')
  +`<div style="padding:16px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <button class="pg-b" id="dw-first" ${dailyWeek===0?'disabled':''}>&#171;</button>
    <button class="pg-b" id="dw-prev" ${dailyWeek===0?'disabled':''}>&#8249; Prev</button>
    <span style="font-family:'Cinzel',serif;color:var(--gold);font-size:.88rem">Week ${dailyWeek+1} of ${totalW}</span>
    <button class="pg-b" id="dw-next" ${dailyWeek>=totalW-1?'disabled':''}>Next &#8250;</button>
    <button class="pg-b" id="dw-today" style="margin-left:auto;background:var(--gold2);color:#000;border-color:var(--gold)">&#128205; Today</button>
  </div>
  <div class="twrap">
    <table>
      <thead><tr><th>Date</th>${thCbs}<th>Score</th><th>Notes</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function wireDaily(){
  $('dw-first')&&$('dw-first').addEventListener('click',()=>{dailyWeek=0;goto('daily')});
  $('dw-prev')&&$('dw-prev').addEventListener('click',()=>{dailyWeek=Math.max(0,dailyWeek-1);goto('daily')});
  $('dw-next')&&$('dw-next').addEventListener('click',()=>{dailyWeek=Math.min(Math.ceil(365/7)-1,dailyWeek+1);goto('daily')});
  $('dw-today')&&$('dw-today').addEventListener('click',()=>{dailyWeek=Math.floor((getDayNum()-1)/7);goto('daily')});
  qsAll('.cb').forEach(el=>{
    el.addEventListener('click',()=>{
      const date=el.dataset.date; const key=el.dataset.key;
      if(!DATA.daily[date]) DATA.daily[date]={};
      DATA.daily[date][key]=!DATA.daily[date][key];
      save();
      el.classList.toggle('on');
      const row=el.closest('tr');
      if(row){
        const sc=DAILY_TASKS.filter(t=>DATA.daily[date]&&DATA.daily[date][t.k]).length;
        const scCol=sc>=8?'var(--emerald)':sc>=5?'var(--amber)':'var(--crimson)';
        const scEl=row.querySelector('[style*="Cinzel"]');
        if(scEl){scEl.textContent=sc+'/'+DAILY_TASKS.length;scEl.style.color=scCol;}
      }
    });
  });
  qsAll('.daily-note').forEach(el=>{
    el.addEventListener('blur',()=>{
      const date=el.dataset.date;
      if(!DATA.daily[date]) DATA.daily[date]={};
      DATA.daily[date].note=el.value; save();
    });
  });
}

      DATA.bible[day][field]=!DATA.bible[day][field];
      save(); el.classList.toggle('on');
    });

  qsAll('.bible-ref').forEach(el=>{

}

// WEEKLY REVIEW
// ══════════════════════════════════════════════════════════════════════════
let wkPage=0; const WK_PER=13;
function pageWeekly(pg){
  if(pg!==undefined) wkPage=pg;
  const totalPg=Math.ceil(52/WK_PER);
  const weeks=[];
  for(let i=0;i<52;i++){
    const s=new Date('2026-03-20'); s.setDate(s.getDate()+i*7);
    const e=new Date(s); e.setDate(e.getDate()+6);
    weeks.push({w:i+1,s:s.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}),e:e.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})});
  }
  const slice=weeks.slice(wkPage*WK_PER,(wkPage+1)*WK_PER);
  let tr='';
  slice.forEach(r=>{
    const d=DATA.weekly[r.w]||{};
    const sc=parseFloat(d.score)||0;
    const sc_col=sc>=8?'var(--emerald)':sc>=5?'var(--amber)':'var(--crimson)';
    tr+=`<tr>
      <td style="font-family:'Cinzel',serif;color:var(--gold);font-weight:700">W${r.w}</td>
      <td style="font-size:.78rem;white-space:nowrap">${r.s} – ${r.e}</td>
      <td><input class="inp wk-sc" data-wk="${r.w}" type="number" min="0" max="10" step="0.5" style="width:58px;text-align:center;color:${sc_col}" placeholder="—" value="${d.score||''}"></td>
      <td><input class="inp wk-wt" data-wk="${r.w}" style="width:85px" placeholder="e.g. -1.2kg" value="${d.wt||''}"></td>
      <td><input class="inp wk-win" data-wk="${r.w}" style="min-width:110px" placeholder="Win…" value="${(d.win||'').replace(/"/g,'&quot;')}"></td>
      <td><input class="inp wk-fail" data-wk="${r.w}" style="min-width:110px" placeholder="Fail…" value="${(d.fail||'').replace(/"/g,'&quot;')}"></td>
      <td><input class="inp wk-fix" data-wk="${r.w}" style="min-width:120px" placeholder="Fix…" value="${(d.fix||'').replace(/"/g,'&quot;')}"></td>
    </tr>`;
  });
  let pgBtns='';
  for(let i=0;i<totalPg;i++) pgBtns+=`<button class="pg-b${i===wkPage?' cur':''}" data-pg="${i}">${i*WK_PER+1}–${Math.min((i+1)*WK_PER,52)}</button>`;
  return hero('Every Sunday','Weekly <span>Review</span>','',
    'https://images.unsplash.com/photo-1606761568499-6d2451b23c66?w=1200&q=80','','140px')
  +`<div class="twrap">
    <table>
      <thead><tr><th>Week</th><th>Dates</th><th>Score /10</th><th>Wt Change</th><th>Key Win</th><th>Key Fail</th><th>Fix Next Week</th></tr></thead>
      <tbody>${tr}</tbody>
    </table>
  </div>
  <div class="pag">
    <button class="pg-b" id="wk-prev" ${wkPage===0?'disabled':''}>&#8249; Prev</button>
    ${pgBtns}
    <button class="pg-b" id="wk-next" ${wkPage>=totalPg-1?'disabled':''}>Next &#8250;</button>
  </div>`;
}

function wireWeekly(){
  const wire=(sel,field)=>qsAll(sel).forEach(el=>el.addEventListener('blur',()=>{const w=+el.dataset.wk;if(!DATA.weekly[w])DATA.weekly[w]={};DATA.weekly[w][field]=el.value;save();}));
  wire('.wk-sc','score');wire('.wk-wt','wt');wire('.wk-win','win');wire('.wk-fail','fail');wire('.wk-fix','fix');
  $('wk-prev')&&$('wk-prev').addEventListener('click',()=>{wkPage=Math.max(0,wkPage-1);goto('weekly')});
  $('wk-next')&&$('wk-next').addEventListener('click',()=>{wkPage=Math.min(Math.ceil(52/WK_PER)-1,wkPage+1);goto('weekly')});
  qsAll('.pag [data-pg]').forEach(btn=>btn.addEventListener('click',()=>{wkPage=+btn.dataset.pg;goto('weekly')}));
}

// SPIRITUAL TRACKER
// ══════════════════════════════════════════════════════════════════════════
let spPg=0; const SP_PER=20;
function pageSpiritual(pg){
  if(pg!==undefined) spPg=pg;
  const totalPg=Math.ceil(365/SP_PER);
  const rows=BIBLE_PLAN.slice(spPg*SP_PER,(spPg+1)*SP_PER);
  const today=todayDate();
  let tr='';
  rows.forEach(r=>{
    const bd=DATA.bible[r.day]||{}; const isToday=r.date===today;
    const rc=r.testament==='OT'?'ot-r':r.testament==='NT'?'nt-r':'mix-r';
    const tBdg=r.testament==='OT'?'bdg-g':r.testament==='NT'?'bdg-b':'bdg-v';
    tr+=`<tr class="${rc}" style="${isToday?'background:rgba(245,166,35,.05)':''}">
      <td style="color:var(--gold);font-family:'Cinzel',serif;font-weight:700">${r.day}</td>
      <td style="white-space:nowrap;font-size:.78rem;color:${isToday?'var(--gold)':'var(--text)'}">${isToday?'&#9679; ':''}${r.date}</td>
      <td style="font-size:.8rem">${r.reading}</td>
      <td><span class="bdg ${tBdg}">${r.testament}</span></td>
      <td class="cb-w"><div class="cb bible-cb${bd.mp?' on':''}" data-day="${r.day}" data-field="mp">&#10003;</div></td>
      <td class="cb-w"><div class="cb bible-cb${bd.ep?' on':''}" data-day="${r.day}" data-field="ep">&#10003;</div></td>
      <td class="cb-w"><div class="cb bible-cb${bd.choir?' on':''}" data-day="${r.day}" data-field="choir">&#10003;</div></td>
      <td><input class="inp bible-ref" data-day="${r.day}" style="min-width:150px" placeholder="Today's verse…" value="${(bd.ref||'').replace(/"/g,'&quot;')}"></td>
    </tr>`;
  });
  let pgBtns='';
  for(let i=0;i<totalPg;i++) pgBtns+=`<button class="pg-b${i===spPg?' cur':''}" data-pg="${i}">${i*SP_PER+1}–${Math.min((i+1)*SP_PER,365)}</button>`;
  return hero('Faith Fuels Discipline','Spiritual <span>Tracker</span>',
    '"I can do all things through Christ who strengthens me." — Philippians 4:13',
    'https://images.unsplash.com/photo-1518021964703-4b2030f03085?w=1200&q=80','','160px')
  +`<div class="twrap">
    <table>
      <thead><tr><th>Day</th><th>Date</th><th>Bible Reading</th><th>Testament</th><th>Morn Prayer &#x1F5F9;</th><th>Eve Prayer &#x1F5F9;</th><th>Choir &#x1F5F9;</th><th>Key Verse / Reflection</th></tr></thead>
      <tbody>${tr}</tbody>
    </table>
  </div>
  <div class="pag">
    <button class="pg-b" id="sp-prev" ${spPg===0?'disabled':''}>&#8249; Prev</button>
    ${pgBtns}
    <button class="pg-b" id="sp-next" ${spPg>=totalPg-1?'disabled':''}>Next &#8250;</button>
    <button class="pg-b" style="margin-left:auto;background:var(--gold2);color:#000" id="sp-today">&#128205; Today</button>
  </div>`;
}

function wireSpiritual(){
  wireBible();
  $('sp-prev')&&$('sp-prev').addEventListener('click',()=>{spPg=Math.max(0,spPg-1);goto('spiritual')});
  $('sp-next')&&$('sp-next').addEventListener('click',()=>{spPg=Math.min(Math.ceil(365/SP_PER)-1,spPg+1);goto('spiritual')});
  $('sp-today')&&$('sp-today').addEventListener('click',()=>{spPg=Math.floor((getDayNum()-1)/SP_PER);goto('spiritual')});
  qsAll('.pag [data-pg]').forEach(btn=>btn.addEventListener('click',()=>{spPg=+btn.dataset.pg;goto('spiritual')}));
}
