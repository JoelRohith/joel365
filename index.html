<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joel's 365-Day Master System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Rajdhani:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#07101f;--bg2:#0d1b2e;--bg3:#122240;
  --gold:#f5a623;--gold2:#e8950f;--gold3:#ffd580;
  --green:#10b981;--green2:#059669;
  --red:#ef4444;--red2:#dc2626;
  --blue:#3b82f6;--violet:#8b5cf6;--amber:#f59e0b;
  --card:#0f1f35;--card2:#162840;
  --bdr:rgba(245,166,35,0.15);
  --txt:#e8eaf0;--mut:#8a9ab5;
  --sw:268px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:3px}

/* PARTICLES */
#ptcl{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;border-radius:50%;opacity:0;animation:fup linear infinite}
@keyframes fup{0%{transform:translateY(100vh) scale(0);opacity:0}15%{opacity:.45}85%{opacity:.15}100%{transform:translateY(-5vh);opacity:0}}

/* SIDEBAR */
#sb{position:fixed;left:0;top:0;height:100vh;width:var(--sw);
  background:linear-gradient(180deg,#061525 0%,#0b1e3a 60%,#061220 100%);
  border-right:1px solid var(--bdr);z-index:200;display:flex;flex-direction:column;
  transition:transform .32s cubic-bezier(.4,0,.2,1);overflow:hidden}
#sb.hide{transform:translateX(calc(-1 * var(--sw)))}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;cursor:pointer}
.sb-logo h1{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold);letter-spacing:1.5px;line-height:1.4}
.sb-logo p{font-size:.67rem;color:var(--mut);margin-top:3px;font-family:'Rajdhani'}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-sec{padding:10px 16px 2px;font-size:.6rem;color:rgba(138,154,181,.45);font-family:'Rajdhani';
  letter-spacing:2.5px;text-transform:uppercase;margin-top:4px}
.sb-a{display:flex;align-items:center;gap:11px;padding:9px 16px;color:var(--mut);
  font-family:'Rajdhani';font-size:.9rem;font-weight:600;transition:all .18s;
  border-left:3px solid transparent;cursor:pointer;user-select:none;white-space:nowrap}
.sb-a:hover{color:var(--txt);background:rgba(245,166,35,.06)}
.sb-a.act{color:var(--gold);background:rgba(245,166,35,.11);border-left-color:var(--gold)}
.sb-a .ic{width:18px;text-align:center;font-size:.88rem;flex-shrink:0}
.sb-foot{padding:12px 16px;border-top:1px solid var(--bdr);font-size:.7rem;color:var(--mut);flex-shrink:0}
.sb-foot b{color:var(--gold);font-family:'Rajdhani';font-size:.8rem}

/* TOPBAR */
#tb{position:fixed;top:0;left:var(--sw);right:0;height:50px;
  background:rgba(7,16,31,.97);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bdr);z-index:199;
  display:flex;align-items:center;padding:0 18px;gap:12px;
  transition:left .32s cubic-bezier(.4,0,.2,1)}
#tb.full{left:0}
.mbtn{background:none;border:none;color:var(--gold);font-size:1.1rem;cursor:pointer;
  padding:5px 7px;border-radius:6px;transition:background .15s;flex-shrink:0}
.mbtn:hover{background:rgba(245,166,35,.12)}
#tb-ttl{font-family:'Cinzel',serif;font-size:.92rem;color:var(--gold3);font-weight:500;flex:1}
.daybdg{background:linear-gradient(135deg,var(--gold2),var(--amber));color:#000;
  font-family:'Rajdhani';font-size:.8rem;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}

/* MAIN */
#main{margin-left:var(--sw);margin-top:50px;min-height:calc(100vh - 50px);
  transition:margin-left .32s cubic-bezier(.4,0,.2,1);position:relative;z-index:1}
#main.full{margin-left:0}

/* PAGE ANIM */
.pg{animation:pin .3s ease}
@keyframes pin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{position:relative;overflow:hidden;display:flex;align-items:flex-end}
.hbg{position:absolute;inset:0;background-size:cover;background-position:center;
  transition:opacity .5s;filter:brightness(.22) saturate(1.3)}
.hov{position:absolute;inset:0;background:linear-gradient(160deg,rgba(7,16,31,.95) 0%,rgba(15,31,53,.7) 50%,rgba(7,16,31,.9) 100%)}
.hc{position:relative;z-index:2;padding:40px 36px 36px;width:100%}
.hey{font-family:'Rajdhani';font-size:.78rem;letter-spacing:3.5px;color:var(--gold);
  text-transform:uppercase;margin-bottom:8px}
.hh{font-family:'Cinzel',serif;font-size:clamp(1.4rem,3.5vw,2.4rem);font-weight:900;
  color:#fff;line-height:1.2;margin-bottom:10px}
.hh span{color:var(--gold)}
.hsub{font-size:.85rem;color:var(--mut);max-width:460px;line-height:1.7;margin-bottom:22px}
.hstats{display:flex;gap:24px;flex-wrap:wrap}
.hsv{font-family:'Cinzel',serif;font-size:1.7rem;color:var(--gold);font-weight:700;line-height:1}
.hsl{font-size:.67rem;color:var(--mut);font-family:'Rajdhani';text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* SECTION HEADER */
.sh{padding:22px 28px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sh h2{font-family:'Cinzel',serif;font-size:1.15rem;color:var(--gold)}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;
  font-size:.7rem;font-family:'Rajdhani';font-weight:700}
.bg{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.25)}
.bge{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.bgr{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.bgb{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.bgv{background:rgba(139,92,246,.1);color:var(--violet);border:1px solid rgba(139,92,246,.25)}
.bga{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.25)}

/* DIVIDER */
.divg{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:6px 28px}

/* CARD GRID */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;padding:20px 28px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;
  cursor:pointer;transition:transform .28s,box-shadow .28s;text-decoration:none;display:block}
.card:hover{transform:translateY(-5px);box-shadow:0 18px 50px rgba(245,166,35,.1)}
.card img{width:100%;height:140px;object-fit:cover;display:block;
  transition:filter .3s;filter:brightness(.78) saturate(1.1)}
.card:hover img{filter:brightness(.9) saturate(1.3)}
.cb{padding:14px 16px}
.cico{font-size:1.2rem;margin-bottom:6px}
.ct{font-family:'Cinzel',serif;font-size:.87rem;color:var(--gold);margin-bottom:4px}
.cd{font-size:.75rem;color:var(--mut);line-height:1.5}
.pbar{margin-top:10px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold2),var(--green))}

/* TODAY CHECKLIST */
.tcg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;margin-top:12px}
.tci{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--bdr);
  border-radius:9px;padding:9px 11px;cursor:pointer;transition:all .18s;user-select:none}
.tci:hover{border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.04)}
.tci.dn{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3)}
.tci.dn .tlbl{color:var(--green)}

/* TABLE */
.twrap{padding:14px 28px;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:var(--card2);color:var(--gold);font-family:'Rajdhani';font-weight:700;
  padding:8px 11px;text-align:left;border-bottom:2px solid var(--bdr);
  white-space:nowrap;font-size:.75rem;letter-spacing:.3px;position:sticky;top:0;z-index:1}
td{padding:7px 11px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--txt);vertical-align:middle}
tr:hover td{background:rgba(245,166,35,.025)}
.otr td{border-left:3px solid var(--amber)}
.ntr td{border-left:3px solid var(--blue)}
.mtr td{border-left:3px solid var(--violet)}

/* CHECKBOX */
.cbw{text-align:center}
.ck{width:22px;height:22px;border:2px solid rgba(255,255,255,.18);border-radius:6px;
  background:transparent;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;transition:all .18s;font-size:.8rem;
  color:transparent;user-select:none;flex-shrink:0}
.ck:hover{border-color:var(--green)}
.ck.on{background:var(--green2);border-color:var(--green);color:#fff;animation:pop .2s ease}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}

/* INPUT */
.inp{background:var(--card2);border:1px solid var(--bdr);border-radius:7px;
  color:var(--txt);padding:5px 9px;font-family:'Nunito';font-size:.78rem;
  outline:none;transition:border-color .18s}
.inp:focus{border-color:var(--gold)}

/* PAGINATION */
.pag{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px;flex-wrap:wrap}
.pgb{background:var(--card2);border:1px solid var(--bdr);color:var(--txt);
  padding:5px 11px;border-radius:7px;cursor:pointer;font-family:'Rajdhani';
  transition:all .18s;font-size:.8rem;font-weight:600}
.pgb:hover{background:var(--gold2);color:#000;border-color:var(--gold)}
.pgb.cur{background:var(--gold);color:#000;border-color:var(--gold)}
.pgb:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* MEAL CARDS */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;padding:16px 28px}
.mc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;
  transition:transform .28s,box-shadow .28s}
.mc:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.45)}
.mc img{width:100%;height:165px;object-fit:cover;filter:brightness(.82)}
.mcb{padding:15px}
.mct{font-family:'Rajdhani';font-size:.72rem;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.mcn{font-family:'Cinzel',serif;font-size:.9rem;color:var(--txt);margin:3px 0 8px}
.mci{font-size:.76rem;color:var(--mut);line-height:1.65;white-space:pre-line}
.calb{display:inline-flex;align-items:center;gap:5px;background:rgba(245,166,35,.08);
  border:1px solid rgba(245,166,35,.2);border-radius:20px;padding:2px 9px;
  font-size:.7rem;color:var(--gold);margin-top:8px;font-family:'Rajdhani';font-weight:700}

/* TIMELINE */
.tl{padding:22px 28px;position:relative}
.tl::before{content:'';position:absolute;left:46px;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--gold),var(--green),var(--blue))}
.tli{display:flex;gap:18px;margin-bottom:28px;position:relative}
.tlico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.85rem;flex-shrink:0;z-index:1;margin-top:4px;
  border:2px solid currentColor}
.tlb{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:12px;
  padding:16px;transition:transform .22s}
.tlb:hover{transform:translateX(4px)}

/* PHASE CARDS */
.phg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:16px 28px}
.phc{border-radius:14px;overflow:hidden;border:1px solid var(--bdr);transition:transform .28s}
.phc:hover{transform:translateY(-4px)}

/* FOOD GRID */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px;padding:14px 28px}
.fc{background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:14px;
  transition:transform .2s,box-shadow .2s}
.fc:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.35)}

/* OIL STEPS */
.oilw{padding:12px 28px}
.oils{display:flex;gap:13px;padding:13px;background:var(--card);border:1px solid var(--bdr);
  border-radius:11px;margin-bottom:10px;transition:transform .2s}
.oils:hover{transform:translateX(4px)}
.oiln{width:29px;height:29px;border-radius:50%;background:var(--gold2);color:#000;
  display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;
  font-weight:700;font-size:.82rem;flex-shrink:0;margin-top:2px}

/* QUOTE CARDS */
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:16px 28px}
.qc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px;
  position:relative;overflow:hidden;transition:transform .28s}
.qc:hover{transform:translateY(-4px)}
.qc::before{content:'"';position:absolute;top:-16px;left:12px;font-size:7rem;
  color:rgba(245,166,35,.05);font-family:'Cinzel',serif;line-height:1;pointer-events:none}

/* HAIR WEEK */
.hwk{display:grid;grid-template-columns:repeat(7,1fr);gap:9px;padding:13px 28px}
.hwd{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:11px 8px;
  text-align:center;transition:transform .2s}
.hwd:hover{transform:translateY(-3px)}
.hwd.sp{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.04)}

/* MCA GRID */
.mcag{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;padding:16px 28px}
.mcac{background:var(--card);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;
  transition:transform .28s,box-shadow .28s}
.mcac:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.4)}

/* TRIGGER CARDS */
.trc{background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:14px;margin-bottom:11px;transition:transform .2s}
.trc:hover{transform:translateX(4px)}

/* INFO BANNER */
.ibanner{margin:14px 28px;padding:13px 17px;background:rgba(245,166,35,.06);
  border:1px solid rgba(245,166,35,.2);border-radius:11px}

/* CHART */
.chwrap{padding:18px 28px}
.chbox{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px}

/* RESPONSIVE */
@media(max-width:900px){:root{--sw:255px}}
@media(max-width:768px){
  #sb{transform:translateX(calc(-1 * var(--sw)))}
  #sb.open{transform:translateX(0)!important}
  #main,#tb{margin-left:0!important;left:0!important}
  #tb{left:0}
  .hwk{grid-template-columns:repeat(3,1fr)}
  .hc{padding:28px 20px 24px}
}
@media(max-width:480px){
  .cgrid,.mgrid,.phg,.fgrid,.mcag{grid-template-columns:1fr}
  .tcg{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="ptcl"></div>

<nav id="sb">
  <div class="sb-logo" onclick="goto('dashboard')">
    <h1>JOEL'S 365<br>MASTER SYSTEM</h1>
    <p>20-March-2026 &#x2192; 19-March-2027</p>

</nav>

<header id="tb">

  </button>

</header>

<main id="main"></main>

// ── Helpers ───────────────────────────────────────────────────────────────
var START_D=new Date('2026-03-20T00:00:00');
function getDN(){
  var ms=new Date()-START_D;
  var d=Math.floor(ms/86400000)+1;
  return Math.max(1,Math.min(365,d));
}
function todayStr(){return DATES[Math.min(getDN()-1,364)];}
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function el(id){return document.getElementById(id);}
function qsa(sel){return Array.prototype.slice.call(document.querySelectorAll(sel));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var DATA=lsGet('joel_v4')||{daily:{},bible:{},weight:{},weekly:{}};
function save(){lsSet('joel_v4',DATA);}

function buildSidebar(active){
  var nav=el('sbnav');
  if(!nav){return;}
  var html='';
  for(var i=0;i<NAV.length;i++){
    var item=NAV[i];
    if(item.sec){
      html+='<div class="sb-sec">'+esc(item.sec)+'</div>';
    } else {
      html+='<div class="sb-a'+(active===item.id?' act':'')+'" onclick="goto(''+item.id+'')">'
        +'<span class="ic"><i class="fas '+item.ico+'"></i></span>'+esc(item.lbl)+'</div>';
    }
  }
  nav.innerHTML=html;
  var dn=getDN();
  var sd=el('sbday'); if(sd) sd.textContent='Day '+dn+' of 365';
  var td=el('tbday'); if(td) td.textContent='Day '+dn;
}

// ── Sidebar toggle ─────────────────────────────────────────────────────────
var sidebarOpen=true;
function toggleSidebar(){
  var sb=el('sb'); var mn=el('main'); var tb=el('tb');
  if(window.innerWidth<=768){
    sb.classList.toggle('open');
  } else {
    sidebarOpen=!sidebarOpen;
    if(sidebarOpen){
      sb.classList.remove('hide');
      mn.classList.remove('full');
      tb.classList.remove('full');
    } else {
      sb.classList.add('hide');
      mn.classList.add('full');
      tb.classList.add('full');
    }
  }
}

// ── Router ─────────────────────────────────────────────────────────────────
var curPage='';
function goto(page){
  curPage=page;
  var ttl=el('tb-ttl'); if(ttl) ttl.textContent=PTITLES[page]||page;
  buildSidebar(page);
  if(window.innerWidth<=768){
    var sb=el('sb'); if(sb) sb.classList.remove('open');
  }
  renderPage(page);
  window.scrollTo(0,0);
}

function renderPage(page){
  var main=el('main');
  if(!main){return;}
  var div=document.createElement('div');
  div.className='pg';
  try{
    if(page==='dashboard') div.innerHTML=pgDashboard();
    else if(page==='daily') div.innerHTML=pgDaily();
    else if(page==='career') div.innerHTML=pgCareer();
    else if(page==='diet') div.innerHTML=pgDiet();
    else if(page==='workout') div.innerHTML=pgWorkout();
    else if(page==='weight') div.innerHTML=pgWeight();
    else if(page==='mca') div.innerHTML=pgMCA();
    else if(page==='bible') div.innerHTML=pgBible();
    else if(page==='hm') div.innerHTML=pgHM();
    else if(page==='hair') div.innerHTML=pgHair();
    else if(page==='weekly') div.innerHTML=pgWeekly();
    else if(page==='spiritual') div.innerHTML=pgSpiritual();
    else if(page==='motivation') div.innerHTML=pgMotivation();
    else div.innerHTML='<div style="padding:40px;color:var(--mut)">Page not found</div>';
  } catch(e){
    div.innerHTML='<div style="padding:40px;color:var(--red)">Error: '+esc(e.message)+'</div>';
  }
  main.innerHTML='';
  main.appendChild(div);
  setTimeout(function(){wireEvents(page);},0);
}

function wireEvents(page){
  qsa('.gp').forEach(function(el){
    el.addEventListener('click',function(){goto(this.dataset.p);}.bind(el));
  });
  if(page==='daily') wireDailyEvt();
  if(page==='weight') wireWeightEvt();
  if(page==='bible'||page==='spiritual') wireBibleEvt();
  if(page==='weekly') wireWeeklyEvt();
}

function toggleTask(elem){
  var date=elem.dataset.date; var key=elem.dataset.key;
  if(!DATA.daily[date]) DATA.daily[date]={};
  DATA.daily[date][key]=!DATA.daily[date][key];
  save();
  renderPage('dashboard');
}

var DW=0;
function pgDaily(){
  var dn=getDN(); var tw=Math.ceil(365/7); var today=todayStr();
  var ws=DW*7; var wdates=DATES.slice(ws,ws+7);
  var thCbs=''; for(var i=0;i<TASKS.length;i++) thCbs+='<th>'+TASKS[i].l.split(' ')[0]+'</th>';
  var rows='';
  for(var i=0;i<wdates.length;i++){
    var date=wdates[i]; var d=DATA.daily[date]||{}; var isT=(date===today);
    var sc=taskScore(date); var scC=sc>=8?'var(--green)':sc>=5?'var(--amber)':'var(--red)';
    var cbs='';
    for(var j=0;j<TASKS.length;j++){
      var t=TASKS[j]; var on=!!d[t.k];
      cbs+='<td class="cbw"><div class="ck'+(on?' on':'')+'" data-date="'+date+'" data-key="'+t.k+'">&#10003;</div></td>';
    }
    rows+='<tr style="'+(isT?'background:rgba(245,166,35,.05);outline:1px solid rgba(245,166,35,.18)':'')+'">'
      +'<td style="font-family:'Rajdhani';font-weight:700;white-space:nowrap;font-size:.78rem;color:'+(isT?'var(--gold)':'var(--txt)')+'">'+date+'</td>'
      +cbs
      +'<td><span style="font-family:'Cinzel',serif;color:'+scC+';font-weight:700;font-size:.82rem">'+sc+'/'+TASKS.length+'</span></td>'
      +'<td><input class="inp dnote" data-date="'+date+'" style="min-width:120px" placeholder="Note…" value="'+esc(d.note||'')+'"></td>'
      +'</tr>';
  }
  return hero('Track Every Day','Daily <span>Discipline</span> Tracker','',
    'https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=1200&q=80','','150px')
  +'<div style="padding:14px 28px;display:flex;align-items:center;gap:9px;flex-wrap:wrap">'
  +'<button class="pgb" onclick="DW=0;goto('daily')" '+(DW===0?'disabled':'')+'>&#171;</button>'
  +'<button class="pgb" onclick="DW=Math.max(0,DW-1);goto('daily')" '+(DW===0?'disabled':'')+'>&#8249; Prev</button>'
  +'<span style="font-family:'Cinzel',serif;color:var(--gold);font-size:.85rem">Week '+(DW+1)+' of '+tw+'</span>'
  +'<button class="pgb" onclick="DW=Math.min('+(tw-1)+',DW+1);goto('daily')" '+(DW>=tw-1?'disabled':'')+'>Next &#8250;</button>'
  +'<button class="pgb" onclick="DW=Math.floor(('+(dn-1)+')/7);goto('daily')" style="margin-left:auto;background:var(--gold2);color:#000;border-color:var(--gold)">&#128205; Today</button>'
  +'</div>'
  +'<div class="twrap"><table><thead><tr><th>Date</th>'+thCbs+'<th>Score</th><th>Notes</th></tr></thead>'
  +'<tbody>'+rows+'</tbody></table></div>';
}

function wireDailyEvt(){
  qsa('.ck').forEach(function(elem){
    elem.addEventListener('click',function(){
      var date=this.dataset.date; var key=this.dataset.key;
      if(!DATA.daily[date]) DATA.daily[date]={};
      DATA.daily[date][key]=!DATA.daily[date][key];
      save();
      this.classList.toggle('on');
      var row=this.closest('tr');
      if(row){
        var sc=taskScore(date);
        var scEl=row.querySelector('[style*="Cinzel"]');
        if(scEl){
          scEl.textContent=sc+'/'+TASKS.length;
          scEl.style.color=sc>=8?'var(--green)':sc>=5?'var(--amber)':'var(--red)';
        }
      }
    }.bind(elem));
  });
  qsa('.dnote').forEach(function(elem){
    elem.addEventListener('blur',function(){
      var date=this.dataset.date;
      if(!DATA.daily[date]) DATA.daily[date]={};
      DATA.daily[date].note=this.value; save();
    }.bind(elem));
  });
}

// WEEKLY REVIEW
// ══════════════════════════════════════════════════════════════════════════
var WKPG=0; var WKPER=13;
function pgWeekly(){
  var total=Math.ceil(52/WKPER);
  var weeks=[];
  for(var i=0;i<52;i++){
    var s=new Date('2026-03-20'); s.setDate(s.getDate()+i*7);
    var e=new Date(s); e.setDate(e.getDate()+6);
    weeks.push({w:i+1,
      s:s.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}),
      e:e.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})});
  }
  var slice=weeks.slice(WKPG*WKPER,(WKPG+1)*WKPER);
  var tr='';
  for(var i=0;i<slice.length;i++){
    var r=slice[i]; var d=DATA.weekly[r.w]||{};
    var sc=parseFloat(d.score)||0;
    var scC=sc>=8?'var(--green)':sc>=5?'var(--amber)':'var(--red)';
    tr+='<tr>'
      +'<td style="font-family:'Cinzel',serif;color:var(--gold);font-weight:700">W'+r.w+'</td>'
      +'<td style="font-size:.76rem;white-space:nowrap">'+r.s+' – '+r.e+'</td>'
      +'<td><input class="inp wksc" data-wk="'+r.w+'" type="number" min="0" max="10" step="0.5" style="width:56px;text-align:center;color:'+scC+'" placeholder="—" value="'+esc(d.score||'')+'"></td>'
      +'<td><input class="inp wkwt" data-wk="'+r.w+'" style="width:82px" placeholder="e.g. -1.2kg" value="'+esc(d.wt||'')+'"></td>'
      +'<td><input class="inp wkwin" data-wk="'+r.w+'" style="min-width:105px" placeholder="Win…" value="'+esc(d.win||'')+'"></td>'
      +'<td><input class="inp wkfail" data-wk="'+r.w+'" style="min-width:105px" placeholder="Fail…" value="'+esc(d.fail||'')+'"></td>'
      +'<td><input class="inp wkfix" data-wk="'+r.w+'" style="min-width:115px" placeholder="Fix…" value="'+esc(d.fix||'')+'"></td>'
      +'</tr>';
  }
  var pgBtns='';
  for(var i=0;i<total;i++) pgBtns+='<button class="pgb'+(i===WKPG?' cur':'')+'" onclick="WKPG='+i+';goto('weekly')">'+(i*WKPER+1)+'-'+Math.min((i+1)*WKPER,52)+'</button>';
  return hero('Every Sunday','Weekly <span>Review</span>','',
    'https://images.unsplash.com/photo-1606761568499-6d2451b23c66?w=1200&q=80','','140px')
  +'<div class="twrap"><table><thead><tr><th>Week</th><th>Dates</th><th>Score /10</th><th>Wt Change</th><th>Key Win</th><th>Key Fail</th><th>Fix Next Week</th></tr></thead><tbody>'+tr+'</tbody></table></div>'
  +'<div class="pag"><button class="pgb" onclick="WKPG=Math.max(0,WKPG-1);goto('weekly')" '+(WKPG===0?'disabled':'')+'>&#8249; Prev</button>'+pgBtns+'<button class="pgb" onclick="WKPG=Math.min('+(total-1)+',WKPG+1);goto('weekly')" '+(WKPG>=total-1?'disabled':'')+'>Next &#8250;</button></div>';
}

function wireWeeklyEvt(){
  function wire(sel,field){
    qsa(sel).forEach(function(elem){
      elem.addEventListener('blur',function(){
        var w=parseInt(this.dataset.wk);
        if(!DATA.weekly[w]) DATA.weekly[w]={};
        DATA.weekly[w][field]=this.value; save();
      }.bind(elem));
    });
  }
  wire('.wksc','score'); wire('.wkwt','wt'); wire('.wkwin','win'); wire('.wkfail','fail'); wire('.wkfix','fix');
}
