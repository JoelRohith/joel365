<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joel's 365-Day Master System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Rajdhani:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>

:root{
  --bg:#06111e;--bg2:#0b1a2d;--bg3:#111f33;
  --gold:#f5a623;--gold2:#d4880a;--gold3:#ffe08a;
  --green:#12c78a;--green2:#0a9e6e;--green3:#d0f5e8;
  --red:#f04040;--blue:#3d9be9;--violet:#9b6cf5;
  --amber:#f5b942;--orange:#f57c35;
  --card:#0c1e32;--card2:#132438;--card3:#1a2e42;
  --bdr:rgba(245,166,35,.13);--bdr2:rgba(245,166,35,.25);
  --txt:#dde6f0;--txt2:#a8bdd4;--mut:#6a85a0;
  --sw:272px;--r:12px;
  --shadow:0 8px 32px rgba(0,0,0,.45);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:3px}
img{loading:lazy}

/* PARTICLES */
#ptcl{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;border-radius:50%;opacity:0;animation:fup linear infinite}
@keyframes fup{0%{transform:translateY(110vh) scale(0);opacity:0}15%{opacity:.5}80%{opacity:.18}100%{transform:translateY(-6vh);opacity:0}}

/* MUSIC PLAYER */
#music-bar{position:fixed;bottom:0;left:var(--sw);right:0;height:46px;background:rgba(6,17,30,.97);border-top:1px solid var(--bdr);z-index:300;display:flex;align-items:center;padding:0 18px;gap:14px;transition:left .3s ease}
#music-bar.full{left:0}
.mbtn2{background:none;border:none;color:var(--gold);font-size:1rem;cursor:pointer;padding:4px 7px;border-radius:6px;transition:background .15s;flex-shrink:0}
.mbtn2:hover{background:rgba(245,166,35,.12)}
#vol-sl{-webkit-appearance:none;appearance:none;width:90px;height:3px;border-radius:2px;background:var(--bdr2);outline:none;cursor:pointer}
#vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer}
#music-label{font-family:'Rajdhani',sans-serif;font-size:.75rem;color:var(--mut);flex:1}
.note-anim{display:inline-block;animation:notebounce 1.2s ease infinite}
@keyframes notebounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* SIDEBAR */
#sb{position:fixed;left:0;top:0;height:100vh;width:var(--sw);background:linear-gradient(180deg,#050f1a 0%,#091726 50%,#040e18 100%);border-right:1px solid var(--bdr);z-index:200;display:flex;flex-direction:column;transition:transform .3s ease;overflow:hidden}
#sb.hide{transform:translateX(calc(-1 * var(--sw)))}
.sb-logo{padding:20px 17px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;cursor:pointer;position:relative;overflow:hidden}
.sb-logo::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(245,166,35,.08),transparent 70%)}
.sb-logo h1{font-family:'Cinzel',serif;font-size:.92rem;color:var(--gold);letter-spacing:1.5px;line-height:1.4;position:relative}
.sb-logo p{font-size:.64rem;color:var(--mut);margin-top:3px;font-family:'Rajdhani',sans-serif;position:relative}
.sb-nav{flex:1;overflow-y:auto;padding:5px 0}
.sb-sec{padding:9px 15px 2px;font-size:.58rem;color:rgba(106,133,160,.5);font-family:'Rajdhani',sans-serif;letter-spacing:2.5px;text-transform:uppercase;margin-top:4px}
.sb-a{display:flex;align-items:center;gap:10px;padding:8px 15px;color:var(--mut);font-family:'Rajdhani',sans-serif;font-size:.87rem;font-weight:600;transition:all .15s;border-left:3px solid transparent;cursor:pointer;white-space:nowrap;user-select:none}
.sb-a:hover{color:var(--txt);background:rgba(245,166,35,.06)}
.sb-a.act{color:var(--gold);background:rgba(245,166,35,.1);border-left-color:var(--gold)}
.sb-a .ic{width:17px;text-align:center;font-size:.84rem;flex-shrink:0}
.sb-a .badge-count{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:0 6px;font-size:.62rem;font-weight:700}
.sb-foot{padding:11px 15px;border-top:1px solid var(--bdr);font-size:.67rem;color:var(--mut);flex-shrink:0}
#sb-score{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;display:block;margin-bottom:2px}

/* TOPBAR */
#tb{position:fixed;top:0;left:var(--sw);right:0;height:50px;background:rgba(6,17,30,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);z-index:199;display:flex;align-items:center;padding:0 17px;gap:11px;transition:left .3s ease}
#tb.full{left:0}
.hbtn{background:none;border:none;color:var(--gold);font-size:1.05rem;cursor:pointer;padding:5px 7px;border-radius:6px;transition:background .15s;flex-shrink:0}
.hbtn:hover{background:rgba(245,166,35,.12)}
#tb-ttl{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold3);font-weight:500;flex:1}
.daybdg{background:linear-gradient(135deg,var(--gold2),var(--amber));color:#000;font-family:'Rajdhani',sans-serif;font-size:.77rem;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* MAIN */
#main{margin-left:var(--sw);margin-top:50px;min-height:calc(100vh - 96px);padding-bottom:46px;transition:margin-left .3s ease;position:relative;z-index:1}
#main.full{margin-left:0}
.pg{animation:pin .32s ease}
@keyframes pin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{position:relative;overflow:hidden;display:flex;align-items:flex-end}
.hbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.2) saturate(1.4);transition:filter 1s ease}
.hov{position:absolute;inset:0;background:linear-gradient(160deg,rgba(6,17,30,.96) 0%,rgba(12,30,50,.68) 55%,rgba(6,17,30,.92) 100%)}
.hc{position:relative;z-index:2;padding:36px 30px 30px;width:100%}
.hey{font-family:'Rajdhani',sans-serif;font-size:.74rem;letter-spacing:3.5px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.hh{font-family:'Cinzel',serif;font-size:clamp(1.3rem,3.2vw,2.2rem);font-weight:900;color:#fff;line-height:1.2;margin-bottom:10px}
.hh span{color:var(--gold)}
.hsub{font-size:.82rem;color:var(--txt2);max-width:440px;line-height:1.75;margin-bottom:20px}
.hstats{display:flex;gap:20px;flex-wrap:wrap}
.hsv{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--gold);font-weight:700;line-height:1}
.hsl{font-size:.63rem;color:var(--mut);font-family:'Rajdhani',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:14px;padding:18px 24px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .28s,box-shadow .28s,border-color .28s}
.card:hover{transform:translateY(-6px);box-shadow:var(--shadow);border-color:var(--bdr2)}
.card img{width:100%;height:132px;object-fit:cover;display:block;filter:brightness(.78);transition:filter .3s,transform .3s}
.card:hover img{filter:brightness(.9);transform:scale(1.04)}
.card .cb{padding:12px 14px}
.cico{font-size:1.15rem;margin-bottom:5px}
.ct{font-family:'Cinzel',serif;font-size:.83rem;color:var(--gold);margin-bottom:3px}
.cd{font-size:.72rem;color:var(--txt2);line-height:1.5}
.pbar{margin-top:9px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold2),var(--green))}

/* SECTION HEADER */
.sh{padding:20px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sh h2{font-family:'Cinzel',serif;font-size:1.08rem;color:var(--gold)}
.divg{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:6px 24px}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.68rem;font-family:'Rajdhani',sans-serif;font-weight:700}
.bg{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.25)}
.bge{background:rgba(18,199,138,.1);color:var(--green);border:1px solid rgba(18,199,138,.25)}
.bgr{background:rgba(240,64,64,.1);color:var(--red);border:1px solid rgba(240,64,64,.25)}
.bgb{background:rgba(61,155,233,.1);color:var(--blue);border:1px solid rgba(61,155,233,.25)}
.bgv{background:rgba(155,108,245,.1);color:var(--violet);border:1px solid rgba(155,108,245,.25)}
.bga{background:rgba(245,185,66,.1);color:var(--amber);border:1px solid rgba(245,185,66,.25)}

/* CHECKLIST - dashboard */
.tcg{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:8px;margin-top:12px}
.tci{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--bdr);border-radius:9px;padding:9px 11px;cursor:pointer;transition:all .18s;user-select:none;position:relative;overflow:hidden}
.tci::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bdr)}
.tci:hover{border-color:var(--bdr2);transform:translateX(2px)}
.tci.dn{background:rgba(18,199,138,.07);border-color:rgba(18,199,138,.3)}
.tci.dn::before{background:var(--green)}
.tci.dn .tlbl{color:var(--green)}

/* CHECKBOX */
.cbw{text-align:center;padding:4px!important}
.ck{width:24px;height:24px;border:2px solid rgba(255,255,255,.18);border-radius:7px;background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .18s;font-size:.82rem;color:transparent;user-select:none;flex-shrink:0}
.ck:hover{border-color:var(--green)}
.ck.on{background:var(--green2);border-color:var(--green);color:#fff;animation:pop .22s ease}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.4)}100%{transform:scale(1)}}

/* INPUT */
.inp{background:var(--card2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);padding:5px 8px;font-family:'Nunito',sans-serif;font-size:.78rem;outline:none;transition:border-color .18s;width:100%}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,166,35,.12)}

/* TABLE */
.twrap{padding:12px 24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:var(--card2);color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700;padding:8px 10px;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap;font-size:.74rem;position:sticky;top:0;z-index:1}
td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--txt);vertical-align:middle;font-size:.79rem}
tr:hover td{background:rgba(245,166,35,.02)}
.otr td{border-left:3px solid var(--amber)}
.ntr td{border-left:3px solid var(--blue)}
.mtr td{border-left:3px solid var(--violet)}
.today-row td{background:rgba(245,166,35,.04)!important;outline:1px solid rgba(245,166,35,.15)}

/* PAGINATION */
.pag{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;flex-wrap:wrap}
.pgb{background:var(--card2);border:1px solid var(--bdr);color:var(--txt);padding:5px 10px;border-radius:7px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;transition:all .15s}
.pgb:hover{background:var(--gold2);color:#000;border-color:var(--gold)}
.pgb.cur{background:var(--gold);color:#000;border-color:var(--gold)}
.pgb[disabled]{opacity:.3;cursor:not-allowed;pointer-events:none}

/* MEAL / IMAGE CARDS */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;padding:14px 24px}
.mc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:transform .28s,box-shadow .28s}
.mc:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
.mc img{width:100%;height:165px;object-fit:cover;filter:brightness(.84);transition:filter .3s,transform .4s}
.mc:hover img{filter:brightness(.95);transform:scale(1.03)}
.mcb{padding:14px}

/* TIMELINE */
.tl{padding:18px 24px;position:relative}
.tl::before{content:'';position:absolute;left:43px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),var(--green),var(--blue))}
.tli{display:flex;gap:15px;margin-bottom:24px}
.tlico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;z-index:1;margin-top:4px;border:2px solid currentColor}
.tlb{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:15px;transition:transform .2s,box-shadow .2s}
.tlb:hover{transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,.3)}

/* PHASE CARDS */
.phg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;padding:14px 24px}
.phc{border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr);transition:transform .28s,box-shadow .28s}
.phc:hover{transform:translateY(-5px);box-shadow:var(--shadow)}

/* FOOD / FEATURE GRID */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px;padding:12px 24px}
.fc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s}
.fc:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.35)}
.fc img{width:100%;height:110px;object-fit:cover;filter:brightness(.85)}
.fc-body{padding:11px}

/* HAIR GRID */
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:14px 24px}
.hcard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:transform .28s,box-shadow .28s}
.hcard:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
.hcard img{width:100%;height:155px;object-fit:cover;filter:brightness(.82);transition:filter .3s,transform .4s}
.hcard:hover img{filter:brightness(.95);transform:scale(1.04)}
.hcard-body{padding:13px}

/* OIL STEPS */
.oilw{padding:10px 24px}
.oils{display:flex;gap:12px;padding:13px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;transition:transform .2s}
.oils:hover{transform:translateX(4px)}
.oiln{width:30px;height:30px;border-radius:50%;background:var(--gold2);color:#000;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:.82rem;flex-shrink:0;margin-top:2px}

/* QUOTE CARDS */
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;padding:14px 24px}
.qc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:transform .28s,box-shadow .28s;position:relative}
.qc:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
.qc img{width:100%;height:140px;object-fit:cover;filter:brightness(.25) saturate(1.3)}
.qc-body{padding:18px;position:relative}
.qc-body::before{content:'"';position:absolute;top:-20px;left:12px;font-size:5rem;color:rgba(245,166,35,.12);font-family:'Cinzel',serif;line-height:1;pointer-events:none}

/* HAIR WEEK */
.hwk{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:12px 24px}
.hwd{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 7px;text-align:center;transition:transform .2s}
.hwd:hover{transform:translateY(-3px)}
.hwd.sp{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.04)}

/* MCA GRID */
.mcag{display:grid;grid-template-columns:repeat(auto-fill,minmax(262px,1fr));gap:14px;padding:14px 24px}
.mcac{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:transform .28s,box-shadow .28s}
.mcac:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
.mcac img{width:100%;height:120px;object-fit:cover;filter:brightness(.7)}

/* TRIGGER CARDS */
.trc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:11px;transition:transform .2s,box-shadow .2s}
.trc:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.3)}

/* INFO BANNERS */
.ib{margin:12px 24px;padding:12px 16px;background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:var(--r)}
.ib-blue{background:rgba(61,155,233,.06);border-color:rgba(61,155,233,.2)}
.ib-green{background:rgba(18,199,138,.06);border-color:rgba(18,199,138,.2)}
.ib-red{background:rgba(240,64,64,.06);border-color:rgba(240,64,64,.2)}

/* CHART */
.chwrap{padding:16px 24px}
.chbox{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px}

/* WEIGHT STATS */
.wstats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:14px 24px}
.wstat{background:var(--card2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;text-align:center}
.wstat-v{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;margin-bottom:2px}
.wstat-l{font-size:.67rem;color:var(--mut);font-family:'Rajdhani',sans-serif;text-transform:uppercase;letter-spacing:.8px}

/* WORKOUT EXERCISE CARDS */
.exgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;padding:14px 24px}
.excard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:transform .28s,box-shadow .28s;cursor:pointer}
.excard:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
.excard img{width:100%;height:150px;object-fit:cover;filter:brightness(.8);transition:filter .3s,transform .5s}
.excard:hover img{filter:brightness(1);transform:scale(1.06)}
.excard-body{padding:13px}
.ex-name{font-family:'Cinzel',serif;font-size:.88rem;color:var(--gold);margin-bottom:4px}
.ex-desc{font-size:.74rem;color:var(--txt2);line-height:1.55}
.ex-sets{display:inline-flex;align-items:center;gap:5px;margin-top:7px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);border-radius:20px;padding:2px 8px;font-size:.7rem;color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700}

/* SPIRITUAL / BIBLE specific */
.spi-today{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(18,199,138,.08));border:1px solid rgba(245,166,35,.25);border-radius:var(--r);padding:18px 20px;margin:12px 24px}
.verse-display{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold3);line-height:1.7;margin:8px 0}

/* WEEKLY REVIEW */
.wkcard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;margin-bottom:12px;transition:border-color .2s}
.wkcard:hover{border-color:var(--bdr2)}

/* RESPONSIVE */
@media(max-width:900px){:root{--sw:258px}}
@media(max-width:768px){#sb{transform:translateX(calc(-1 * var(--sw)))}#sb.open{transform:translateX(0)!important}#main,#tb,#music-bar{margin-left:0!important;left:0!important}#tb{left:0}#music-bar{left:0}.hwk{grid-template-columns:repeat(3,1fr)}.hc{padding:24px 17px 20px}}
@media(max-width:480px){.cgrid,.mgrid,.phg,.fgrid,.mcag,.exgrid,.hgrid{grid-template-columns:1fr}.tcg{grid-template-columns:1fr 1fr}}

</style>
</head>
<body>

<div id="ptcl"></div>

<nav id="sb">
  <div class="sb-logo" onclick="goto('dashboard')">
    <h1>JOEL'S 365<br>MASTER SYSTEM</h1>
    <p>20-March-2026 &#x2192; 19-March-2027</p>
  </div>
  <div class="sb-nav" id="sbnav"></div>
  <div class="sb-foot">
    <span id="sb-score">Day 1 of 365</span>
    All data saved in your browser
  </div>
</nav>

<header id="tb">
  <button class="hbtn" onclick="toggleSB()"><i class="fas fa-bars"></i></button>
  <span id="tb-ttl">Dashboard</span>
  <div class="sync-dot" title="Data saved locally"></div>
  <span class="daybdg" id="tbday">Day 1</span>
</header>

<script>

// ── Bible books & plan generation ────────────────────────────────────────────
var BOOKS=[['Genesis',50],['Exodus',40],['Leviticus',27],['Numbers',36],['Deuteronomy',34],
['Joshua',24],['Judges',21],['Ruth',4],['1 Samuel',31],['2 Samuel',24],
['1 Kings',22],['2 Kings',25],['1 Chronicles',29],['2 Chronicles',36],
['Ezra',10],['Nehemiah',13],['Esther',10],['Job',42],['Psalms',150],
['Proverbs',31],['Ecclesiastes',12],['Song of Solomon',8],['Isaiah',66],
['Jeremiah',52],['Lamentations',5],['Ezekiel',48],['Daniel',12],
['Hosea',14],['Joel',3],['Amos',9],['Obadiah',1],['Jonah',4],
['Micah',7],['Nahum',3],['Habakkuk',3],['Zephaniah',3],['Haggai',2],
['Zechariah',14],['Malachi',4],
['Matthew',28],['Mark',16],['Luke',24],['John',21],['Acts',28],
['Romans',16],['1 Corinthians',16],['2 Corinthians',13],['Galatians',6],
['Ephesians',6],['Philippians',4],['Colossians',4],['1 Thessalonians',5],
['2 Thessalonians',3],['1 Timothy',6],['2 Timothy',4],['Titus',3],
['Philemon',1],['Hebrews',13],['James',5],['1 Peter',5],['2 Peter',3],
['1 John',5],['2 John',1],['3 John',1],['Jude',1],['Revelation',22]];
var OT_N={};for(var _i=0;_i<39;_i++) OT_N[BOOKS[_i][0]]=1;
var ALL_CH=[];for(var bi=0;bi<BOOKS.length;bi++) for(var ci=1;ci<=BOOKS[bi][1];ci++) ALL_CH.push([BOOKS[bi][0],ci]);
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var START=new Date(2026,2,20);
function addD(n){var d=new Date(START);d.setDate(d.getDate()+n);return d;}
function fmtD(d){var day=d.getDate();return (day<10?'0':'')+day+'-'+MONTHS[d.getMonth()]+'-'+d.getFullYear();}
function chLbl(chs){var g=[],cb=chs[0][0],s=chs[0][1],e=chs[0][1];for(var i=1;i<chs.length;i++){if(chs[i][0]===cb&&chs[i][1]===e+1){e=chs[i][1];}else{g.push([cb,s,e]);cb=chs[i][0];s=e=chs[i][1];}}g.push([cb,s,e]);return g.map(function(x){return x[1]===x[2]?x[0]+' '+x[1]:x[0]+' '+x[1]+'-'+x[2];}).join(' | ');}
var BIBLE_PLAN=[],ALL_DATES=[],_base=Math.floor(1189/365),_extra=1189%365,_idx=0;
for(var _d=0;_d<365;_d++){var _cnt=_base+(_d<_extra?1:0);var _chs=ALL_CH.slice(_idx,_idx+_cnt);_idx+=_cnt;ALL_DATES.push(fmtD(addD(_d)));var _bks=[],_bkseen={};for(var _ci=0;_ci<_chs.length;_ci++){if(!_bkseen[_chs[_ci][0]]){_bks.push(_chs[_ci][0]);_bkseen[_chs[_ci][0]]=1;}}var _iot=OT_N[_chs[0][0]]?1:0;var _hnt=0;for(var _ci=0;_ci<_chs.length;_ci++){if(!OT_N[_chs[_ci][0]]){_hnt=1;break;}}BIBLE_PLAN.push({day:_d+1,date:ALL_DATES[_d],reading:chLbl(_chs),testament:_iot&&_hnt?'OT+NT':_iot?'OT':'NT',books:_bks});}
function wtgt(d){if(d<90)return Math.round((86-(20/90)*d)*10)/10;if(d<180)return Math.round((66-(6/90)*(d-90))*10)/10;return 60.0;}

// ── Storage helpers ───────────────────────────────────────────────────────────
function el(id){return document.getElementById(id);}
function qsa(s){return Array.prototype.slice.call(document.querySelectorAll(s));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getDN(){var ms=new Date()-START;var d=Math.floor(ms/86400000)+1;return Math.max(1,Math.min(365,d));}
function today(){return ALL_DATES[Math.min(getDN()-1,364)];}
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
var DATA=lsGet('joel_v6')||{daily:{},bible:{},weight:{},weekly:{},hair:{}};
function save(){lsSet('joel_v6',DATA);updateSidebarScore();}

// ── Tasks ─────────────────────────────────────────────────────────────────────
var TASKS=[
  {k:'wake',l:'Wake 6 AM',i:'fa-sun',c:'var(--gold)',pts:1},
  {k:'workout',l:'Morning Walk 60min',i:'fa-person-walking',c:'var(--green)',pts:2},
  {k:'exercises',l:'Home Workout 45min',i:'fa-dumbbell',c:'var(--orange)',pts:2},
  {k:'diet',l:'Diet Plan Followed',i:'fa-apple-whole',c:'var(--amber)',pts:1},
  {k:'nosugar',l:'Zero Sugar Today',i:'fa-ban',c:'var(--red)',pts:2},
  {k:'water',l:'3 Liters Water',i:'fa-droplet',c:'var(--blue)',pts:1},
  {k:'tea',l:'Max 1 Tea/Coffee',i:'fa-mug-hot',c:'var(--txt2)',pts:1},
  {k:'hm',l:'Healthy Mind',i:'fa-brain',c:'var(--violet)',pts:2},
  {k:'career',l:'Career Study 1hr',i:'fa-laptop-code',c:'var(--blue)',pts:2},
  {k:'mca',l:'MCA Study 30min',i:'fa-graduation-cap',c:'var(--violet)',pts:1},
  {k:'bible',l:'Bible Reading',i:'fa-book-open',c:'var(--gold)',pts:2},
  {k:'prayer',l:'Morning Prayer',i:'fa-hands-praying',c:'var(--gold3)',pts:1},
  {k:'sleep',l:'Sleep by 10:30 PM',i:'fa-moon',c:'var(--mut)',pts:1},
  {k:'weight',l:'Weigh-in Done',i:'fa-weight-scale',c:'var(--green)',pts:1},
  {k:'hair',l:'Hair Care Done',i:'fa-hand-sparkles',c:'var(--amber)',pts:1}
];
var MAX_PTS=TASKS.reduce(function(s,t){return s+t.pts;},0);
function tscore(date){var d=DATA.daily[date]||{};return TASKS.reduce(function(s,t){return s+(d[t.k]?t.pts:0);},0);}
function tpct(date){return Math.round(tscore(date)/MAX_PTS*100);}
function tchecked(date){var d=DATA.daily[date]||{};return TASKS.filter(function(t){return d[t.k];}).length;}

function updateSidebarScore(){
  var td=today(),sc=tscore(td),pct=tpct(td),s=el('sb-score');
  if(s) s.textContent='Day '+getDN()+' of 365 · '+pct+'% today';
  var td2=el('tbday'); if(td2) td2.textContent='Day '+getDN();
}

// ── NAV ───────────────────────────────────────────────────────────────────
var NAV=[
  {sec:'Overview'},
  {id:'dashboard',ico:'fa-house',lbl:'Dashboard'},
  {sec:'Health & Fitness'},
  {id:'daily',ico:'fa-calendar-check',lbl:'Daily Tracker'},

];
var PT={dashboard:'Dashboard',daily:'Daily Tracker',career:'Career Roadmap',diet:'Diet Plan',workout:'Workout Plan',weight:'Weight Tracker',mca:'MCA Study Plan',bible:'Bible Reading Plan',hm:'Healthy Mind',hair:'Hair Restoration',weekly:'Weekly Review',spiritual:'Spiritual Tracker',motivation:'Motivation Board'};

// ── SIDEBAR ────────────────────────────────────────────────────────────────
var sbOpen=true;
function toggleSB(){
  var sb=el('sb'),mn=el('main'),tb=el('tb'),mb=el('music-bar');
  if(window.innerWidth<=768){sb.classList.toggle('open');}
  else{sbOpen=!sbOpen;sb.classList.toggle('hide',!sbOpen);mn.classList.toggle('full',!sbOpen);tb.classList.toggle('full',!sbOpen);if(mb)mb.classList.toggle('full',!sbOpen);}

function buildNav(act){
  var h=''; for(var i=0;i<NAV.length;i++){var n=NAV[i];if(n.sec){h+='<div class="sb-sec">'+n.sec+'</div>';}else{h+='<div class="sb-a'+(act===n.id?' act':'')+'" onclick="goto(\''+n.id+'\')">'+'<span class="ic"><i class="fas '+n.ico+'"></i></span>'+n.lbl+'</div>';}}
  var sbn=el('sbnav'); if(sbn) sbn.innerHTML=h;
  updateSidebarScore();

// ── ROUTER ─────────────────────────────────────────────────────────────────
var CUR='';
function goto(page){
  CUR=page;
  var ttl=el('tb-ttl'); if(ttl) ttl.textContent=PT[page]||page;
  buildNav(page);
  if(window.innerWidth<=768){var sb=el('sb');if(sb)sb.classList.remove('open');}
  var main=el('main'); if(!main) return;
  main.innerHTML='<div class="pg" id="pgcont"></div>';
  var cont=el('pgcont'); if(!cont) return;
  try{
    if(page==='dashboard') cont.innerHTML=pgDash();
    else if(page==='daily') cont.innerHTML=pgDaily();
    else if(page==='career') cont.innerHTML=pgCareer();
    else if(page==='diet') cont.innerHTML=pgDiet();
    else if(page==='workout') cont.innerHTML=pgWorkout();
    else if(page==='weight') cont.innerHTML=pgWeight();
    else if(page==='mca') cont.innerHTML=pgMCA();
    else if(page==='bible') cont.innerHTML=pgBible();
    else if(page==='hm') cont.innerHTML=pgHM();
    else if(page==='hair') cont.innerHTML=pgHair();
    else if(page==='weekly') cont.innerHTML=pgWeekly();
    else if(page==='spiritual') cont.innerHTML=pgSpiritual();
    else if(page==='motivation') cont.innerHTML=pgMotivation();
  }catch(err){cont.innerHTML='<div style="padding:30px;color:var(--red);font-size:.85rem">Error: '+esc(err.message)+'</div>';}
  wire(page);
  window.scrollTo(0,0);
}
function wire(page){
  qsa('.gp').forEach(function(e){e.onclick=function(){goto(this.dataset.p);};});
  if(page==='daily') wireDly();
  if(page==='weight') wireWt();
  if(page==='bible'||page==='spiritual') wireBible();
  if(page==='weekly') wireWk();
}

function hst(v,l){return '<div><div class="hsv">'+v+'</div><div class="hsl">'+l+'</div></div>';}

  return '<div class="hero" style="min-height:'+(mh||'190px')+'">'

    +'<div class="hov"></div><div class="hc">'
    +'<div class="hey">'+ey+'</div><div class="hh">'+ti+'</div>'

// ══════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════════════════
function pgDash(){
  var dn=getDN(),td=today(),d=DATA.daily[td]||{};
  var pts=tscore(td),pct=tpct(td),chk=tchecked(td);
  var stats=hst(dn,'Day')+hst(pts+'/'+MAX_PTS,'Points')+hst(pct+'%','Score')+hst(chk+'/'+TASKS.length,'Tasks');
  var pc=pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
  var tc='';
  for(var i=0;i<TASKS.length;i++){
    var t=TASKS[i],on=!!d[t.k];
    tc+='<div class="tci'+(on?' dn':'')+'" onclick="tgl(\''+td+'\',\''+t.k+'\')">'
      +'<i class="fas '+t.i+'" style="color:'+(on?'var(--green)':t.c)+';font-size:.85rem;flex-shrink:0"></i>'
      +'<span class="tlbl" style="font-family:\'Rajdhani\';font-weight:700;font-size:.78rem;flex:1">'+t.l+'</span>'
      +(on?'<i class="fas fa-check-circle" style="color:var(--green);font-size:.72rem;flex-shrink:0"></i>':'<span style="font-size:.64rem;color:var(--mut);font-family:\'Rajdhani\'">+'+t.pts+'pts</span>')
      +'</div>';
  }
  var PAGES=[
    {id:'daily',ico:'fa-calendar-check',t:'Daily Tracker',d:'365-day habit log',img:'https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=500&q=80',p:Math.round(dn/365*100)},
    {id:'workout',ico:'fa-dumbbell',t:'Workout Plan',d:'86kg→66kg in 90 days',img:'https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=500&q=80',p:Math.round(Math.min(dn,90)/90*100)},
    {id:'diet',ico:'fa-utensils',t:'Diet Plan',d:'South Indian controlled diet',img:'https://images.unsplash.com/photo-1589301760014-d929f3979dbc?w=500&q=80',p:pct},
    {id:'weight',ico:'fa-weight-scale',t:'Weight Tracker',d:'3-phase 26kg journey',img:'https://images.unsplash.com/photo-1534258936925-c58bed479fcb?w=500&q=80',p:30},
    {id:'hair',ico:'fa-hand-sparkles',t:'Hair Restoration',d:'Natural Ayurvedic plan',img:'https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=500&q=80',p:10},
    {id:'hm',ico:'fa-brain',t:'Healthy Mind',d:'Discipline & focus system',img:'https://images.unsplash.com/photo-1545389336-cf090694435e?w=500&q=80',p:pct},
    {id:'career',ico:'fa-laptop-code',t:'Career Roadmap',d:'Manual→Automation QA',img:'https://images.unsplash.com/photo-1517180102446-f3ece451e9d8?w=500&q=80',p:20},
    {id:'mca',ico:'fa-graduation-cap',t:'MCA Study Plan',d:'Sem 1 • Exam June 2026',img:'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=500&q=80',p:15},
    {id:'bible',ico:'fa-book-open',t:'Bible Reading',d:'1,189 chapters • 365 days',img:'https://images.unsplash.com/photo-1499209974431-9dddcece7f88?w=500&q=80',p:Math.round(dn/365*100)},
    {id:'spiritual',ico:'fa-cross',t:'Spiritual Tracker',d:'Daily prayer & reflection',img:'https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8?w=500&q=80',p:pct},
    {id:'weekly',ico:'fa-chart-bar',t:'Weekly Review',d:'52-week progress log',img:'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500&q=80',p:Math.round(dn/365*100)},
    {id:'motivation',ico:'fa-fire',t:'Motivation Board',d:'Your WHY & power quotes',img:'https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=500&q=80',p:100}
  ];
  var cards='';
  for(var i=0;i<PAGES.length;i++){
    var pg=PAGES[i];
    cards+='<div class="card gp" data-p="'+pg.id+'">'
      +'<img src="'+pg.img+'" alt="'+pg.t+'" loading="lazy"><div class="cb">'
      +'<div class="cico"><i class="fas '+pg.ico+'" style="color:var(--gold)"></i></div>'
      +'<div class="ct">'+pg.t+'</div><div class="cd">'+pg.d+'</div>'
      +'<div class="pbar"><div class="pfill" style="width:'+pg.p+'%"></div></div>'
      +'<div style="font-size:.67rem;color:var(--mut);margin-top:3px;font-family:\'Rajdhani\'">'+pg.p+'% complete</div>'
      +'</div></div>';
  }
  var streakDays=0;
  for(var si=getDayNum()-1;si>=0;si--){if(tpct(ALL_DATES[si])>=70){streakDays++;}else{break;}}
  return hero('Day '+dn+' of 365 • Score '+pct+'%','Joel\'s <span>Master</span><br>Execution System',
    'Every day is a brick. Every discipline is a wall. Your castle is rising.',
    'https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=1400&q=80',stats,'245px')
  +'<div style="padding:16px 24px 0">'
  +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">'

  +'<div class="tcg">'+tc+'</div></div>'

  +'<div style="padding:11px 24px 4px;font-family:\'Cinzel\',serif;color:var(--gold);font-size:.9rem">All Sections</div>'
  +'<div class="cgrid">'+cards+'</div>';

function tgl(date,key){
  if(!DATA.daily[date]) DATA.daily[date]={};
  DATA.daily[date][key]=!DATA.daily[date][key];
  save(); goto('dashboard');
}

// ══════════════════════════════════════════════════════════════════════════
// DAILY TRACKER
// ══════════════════════════════════════════════════════════════════════════
var DW=0;
function pgDaily(){
  var dn=getDN(),tw=Math.ceil(365/7),td=today();
  var ws=DW*7,wdates=ALL_DATES.slice(ws,ws+7);
  var thCbs=''; for(var i=0;i<TASKS.length;i++) thCbs+='<th title="'+TASKS[i].l+' ('+TASKS[i].pts+'pt)">'+TASKS[i].l.split(' ')[0]+'<br><span style="font-size:.6rem;color:var(--mut)">+'+TASKS[i].pts+'</span></th>';
  var rows='';
  for(var i=0;i<wdates.length;i++){
    var date=wdates[i],d=DATA.daily[date]||{},isT=(date===td);
    var pts=tscore(date),pct=tpct(date);
    var col=pts>=MAX_PTS*0.8?'var(--green)':pts>=MAX_PTS*0.5?'var(--amber)':'var(--red)';
    var cbs='';
    for(var j=0;j<TASKS.length;j++){
      var t=TASKS[j],on=!!d[t.j||t.k];on=!!d[t.k];
      cbs+='<td class="cbw"><div class="ck'+(on?' on':'')+'" data-date="'+date+'" data-key="'+t.k+'" title="'+t.l+'">&#10003;</div></td>';
    }
    rows+='<tr class="'+(isT?'today-row':'')+'">'
      +'<td style="font-family:\'Rajdhani\';font-weight:700;white-space:nowrap;font-size:.77rem;color:'+(isT?'var(--gold)':'var(--txt)')+'">'+date+'</td>'
      +cbs
      +'<td style="min-width:80px"><div style="font-family:\'Cinzel\',serif;color:'+col+';font-weight:700;font-size:.8rem">'+pts+'/'+MAX_PTS+'</div>'
      +'<div style="height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:3px"><div style="width:'+pct+'%;height:100%;background:'+col+'"></div></div></td>'
      +'<td><input class="inp dnote" data-date="'+date+'" style="min-width:115px" placeholder="Notes..." value="'+esc(d.note||'')+'"></td>'
      +'</tr>';
  }
  var weekPts=0;
  for(var i=0;i<wdates.length;i++) weekPts+=tscore(wdates[i]);
  var maxWeekPts=7*MAX_PTS,weekPct=Math.round(weekPts/maxWeekPts*100);
  return hero('Track Every Day','Daily <span>Discipline</span> Tracker',
    'Tap each checkbox to mark complete. Every point counts.',
    'https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=1200&q=80','','150px')
  +'<div style="margin:12px 24px;padding:12px 16px;background:var(--card2);border:1px solid var(--bdr);border-radius:var(--r);display:flex;align-items:center;flex-wrap:wrap;gap:14px">'
  +'<div><div style="font-family:\'Cinzel\',serif;color:var(--gold);font-size:.88rem">Week '+(DW+1)+' Score</div>'
  +'<div style="font-size:.72rem;color:var(--txt2);margin-top:1px">'+weekPts+' of '+maxWeekPts+' points — '+weekPct+'% this week</div></div>'
  +'<div style="flex:1;min-width:120px"><div style="height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden"><div style="width:'+weekPct+'%;height:100%;background:linear-gradient(90deg,var(--gold2),var(--green));border-radius:3px"></div></div></div>'
  +'<div style="display:flex;gap:7px;flex-wrap:wrap">'
  +'<button class="pgb" onclick="DW=0;goto(\'daily\')" '+(DW===0?'disabled':'')+'>&#171;</button>'
  +'<button class="pgb" onclick="DW=Math.max(0,DW-1);goto(\'daily\')" '+(DW===0?'disabled':'')+'>&#8249; Prev</button>'
  +'<button class="pgb" onclick="DW=Math.min('+(tw-1)+',DW+1);goto(\'daily\')" '+(DW>=tw-1?'disabled':'')+'>Next &#8250;</button>'

function wireDly(){
  qsa('.ck').forEach(function(e){
    e.onclick=function(){
      var date=this.dataset.date,key=this.dataset.key;
      if(!DATA.daily[date]) DATA.daily[date]={};
      DATA.daily[date][key]=!DATA.daily[date][key];
      save(); this.classList.toggle('on');
      var row=this.closest('tr');
      if(row){
        var sc=tscore(date),pct=tpct(date);
        var col=sc>=MAX_PTS*0.8?'var(--green)':sc>=MAX_PTS*0.5?'var(--amber)':'var(--red)';
        var scel=row.querySelector('[style*="Cinzel"]');
        if(scel){scel.textContent=sc+'/'+MAX_PTS;scel.style.color=col;}
        var bar=row.querySelector('[style*="height:4px"] div');
        if(bar){bar.style.width=pct+'%';bar.style.background=col;}
      }
    };
  });
  qsa('.dnote').forEach(function(e){
    e.onblur=function(){if(!DATA.daily[this.dataset.date])DATA.daily[this.dataset.date]={};DATA.daily[this.dataset.date].note=this.value;save();};
  });
}

var WP=0,WPER=30;
function calcWeightStats(){
  var entries=[];
  for(var i=0;i<365;i++){var a=DATA.weight[ALL_DATES[i]];if(a&&parseFloat(a)>0)entries.push({day:i,w:parseFloat(a),date:ALL_DATES[i]});}
  if(!entries.length) return {lost:0,avgPerWeek:0,eta:'Not started yet',daysLeft:0,bmi:'—',status:'Not started'};
  var first=entries[0],last=entries[entries.length-1];
  var lost=Math.round((86-last.w)*10)/10;
  var days=last.day-first.day+1;
  var avgPerWeek=days>0?Math.round((first.w-last.w)/days*7*10)/10:0;
  var remaining=Math.max(0,last.w-60);
  var daysLeft=avgPerWeek>0?Math.round(remaining/avgPerWeek*7):0;
  var etaDate=new Date(2026,2,20+last.day+daysLeft);
  var eta=etaDate.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  var bmi=Math.round(last.w/(1.7*1.7)*10)/10;
  var status=bmi<18.5?'Underweight':bmi<25?'Healthy':bmi<30?'Overweight':'Obese';
  return {lost:lost,avgPerWeek:avgPerWeek,eta:eta,daysLeft:daysLeft,bmi:bmi,status:status,current:last.w,target:60};
}

  var total=Math.ceil(365/WPER),stats=calcWeightStats();

  var lc=stats.lost>0?'var(--green)':'var(--txt2)';

    var date=ALL_DATES[i],tgt=wtgt(i),actual=DATA.weight[date]||'',ph=i<90?1:i<180?2:3;
    var diff=actual!==''?Math.round((parseFloat(actual)-tgt)*10)/10:'';

    var pb=ph===1?'bgr':ph===2?'bga':'bge';
    rows+='<tr><td style="font-family:\'Rajdhani\';font-weight:600;white-space:nowrap;font-size:.77rem">'+date+'</td>'

      +'<td><span class="bdg '+pb+'">P'+ph+'</span></td>'

      +'<td style="color:'+dc+';font-weight:700">'+(diff!==''?(diff>0?'↑ +':'↓ ')+Math.abs(diff)+' kg':'—')+'</td>'
      +'<td style="font-size:.72rem;color:var(--txt2)">'+(actual!==''?'BMI: '+Math.round(parseFloat(actual)/(1.7*1.7)*10)/10:'—')+'</td>'
      +'</tr>';
  }
  var pgBtns='';
  for(var i=0;i<total;i++) pgBtns+='<button class="pgb'+(i===WP?' cur':'')+'" onclick="WP='+i+';goto(\'weight\')">'+(i*WPER+1)+'-'+Math.min((i+1)*WPER,365)+'</button>';

function wireWt(){
  var ctx=el('wcht');
  if(ctx&&window.Chart){
    var sample=[]; for(var i=0;i<365;i+=7) sample.push({date:ALL_DATES[i],target:wtgt(i),actual:DATA.weight[ALL_DATES[i]]||null});
    new Chart(ctx,{type:'line',data:{
      labels:sample.map(function(d){return d.date.split('-').slice(0,2).join(' ');}),
      datasets:[
        {label:'Target',data:sample.map(function(d){return d.target;}),borderColor:'rgba(245,166,35,.5)',borderDash:[5,5],borderWidth:2,pointRadius:0,tension:.4},
        {label:'Actual',data:sample.map(function(d){return d.actual||null;}),borderColor:'#12c78a',backgroundColor:'rgba(18,199,138,.08)',borderWidth:2,pointRadius:3,tension:.4,fill:true,spanGaps:false}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#dde6f0',font:{size:10}}}},scales:{x:{ticks:{color:'#6a85a0',maxTicksLimit:8},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#6a85a0'},grid:{color:'rgba(255,255,255,.04)'}}}}});
  }
  qsa('.winp').forEach(function(e){
    e.onblur=function(){
      DATA.weight[this.dataset.date]=this.value;
      save();
      var stats=calcWeightStats();
      var etaEl=el('weight-eta');
      if(etaEl) etaEl.innerHTML='<div style="font-size:.84rem"><i class="fas fa-bullseye" style="color:var(--green);margin-right:6px"></i>At current pace, you will reach <strong>60 kg</strong> by approximately <strong style="color:var(--green)">'+stats.eta+'</strong> · Keep going! 💪</div>';
    };
  });
}

function wireBible(){

      DATA.bible[day][field]=!DATA.bible[day][field];
      save(); this.classList.toggle('on');
      // sync to daily tracker
      if(field==='mp'||field==='ep'||field==='read'){
        var td=today(); if(!DATA.daily[td]) DATA.daily[td]={};
        DATA.daily[td]['prayer']=(DATA.bible[day]['mp']||DATA.bible[day]['ep'])||false;
        DATA.daily[td]['bible']=DATA.bible[day]['read']||false;
        save();
      }
    };
  });
  qsa('.bref').forEach(function(e){
    e.onblur=function(){var day=parseInt(this.dataset.day);if(!DATA.bible[day])DATA.bible[day]={};DATA.bible[day].ref=this.value;save();};

// WEEKLY REVIEW — integrated with all pages
// ══════════════════════════════════════════════════════════════════════════
var WKPG=0,WKPER=13;
function pgWeekly(){
  var total=Math.ceil(52/WKPER),weeks=[];
  for(var i=0;i<52;i++){
    var s=new Date(2026,2,20);s.setDate(s.getDate()+i*7);
    var e=new Date(s);e.setDate(e.getDate()+6);
    var wDates=ALL_DATES.slice(i*7,i*7+7);
    var totalPts=0,maxPts=7*MAX_PTS,bibRead=0,prayers=0;
    for(var j=0;j<wDates.length;j++){
      totalPts+=tscore(wDates[j]);
      var dayNum=i*7+j+1;
      var bd=DATA.bible[dayNum]||{};
      if(bd.read) bibRead++;
      if(bd.mp||bd.ep) prayers++;
    }
    var scorePct=Math.round(totalPts/maxPts*100);
    // weight for the week
    var wt='';
    for(var j=6;j>=0;j--){var wdat=wDates[j];if(DATA.weight[wdat]){wt=DATA.weight[wdat];break;}}
    weeks.push({w:i+1,s:s.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}),
      e:e.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}),
      totalPts:totalPts,maxPts:maxPts,scorePct:scorePct,bibRead:bibRead,prayers:prayers,wt:wt});
  }
  var slice=weeks.slice(WKPG*WKPER,(WKPG+1)*WKPER),tr='';
  for(var i=0;i<slice.length;i++){
    var r=slice[i],d=DATA.weekly[r.w]||{};
    var sc=r.scorePct;
    var scC=sc>=80?'var(--green)':sc>=50?'var(--amber)':'var(--red)';
    tr+='<tr>'
      +'<td style="font-family:\'Cinzel\',serif;color:var(--gold);font-weight:700">W'+r.w+'</td>'
      +'<td style="font-size:.76rem;white-space:nowrap;color:var(--txt2)">'+r.s+' – '+r.e+'</td>'
      +'<td><div style="font-family:\'Cinzel\',serif;color:'+scC+';font-weight:700;font-size:.85rem">'+r.totalPts+'/'+r.maxPts+'</div><div style="height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:3px"><div style="width:'+sc+'%;height:100%;background:'+scC+'"></div></div></td>'
      +'<td style="text-align:center"><span style="font-size:.82rem;color:'+(r.bibRead>=7?'var(--green)':'var(--txt2)')+'">'+r.bibRead+'/7</span></td>'
      +'<td style="text-align:center"><span style="font-size:.82rem;color:'+(r.prayers>=7?'var(--green)':'var(--txt2)')+'">'+r.prayers+'/7</span></td>'
      +'<td style="color:var(--blue);font-weight:700;font-size:.82rem">'+(r.wt||'—')+' kg</td>'
      +'<td><input class="inp wkwin" data-wk="'+r.w+'" style="min-width:100px;font-size:.76rem" placeholder="This week\'s win..." value="'+esc(d.win||'')+'"></td>'
      +'<td><input class="inp wkfail" data-wk="'+r.w+'" style="min-width:100px;font-size:.76rem" placeholder="What to fix..." value="'+esc(d.fail||'')+'"></td>'
      +'</tr>';
  }
  var pgBtns='';
  for(var i=0;i<total;i++) pgBtns+='<button class="pgb'+(i===WKPG?' cur':'')+'" onclick="WKPG='+i+';goto(\'weekly\')">'+(i*WKPER+1)+'-'+Math.min((i+1)*WKPER,52)+'</button>';
  return hero('Weekly Progress Review','Weekly <span>Review</span>',
    'Scores pulled automatically from Daily Tracker, Bible & Weight data',
    'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1200&q=80','','148px')
  +'<div class="ib ib-green" style="margin:12px 24px"><div style="font-size:.84rem"><i class="fas fa-circle-info" style="color:var(--green);margin-right:6px"></i><strong>Auto-integrated:</strong> Score, Bible reading count, Prayer count, and Weight are all pulled automatically from your logged data. Only add your personal Win and Fix notes.</div></div>'
  +'<div class="twrap"><table><thead><tr><th>Week</th><th>Dates</th><th>Score (Auto)</th><th>Bible</th><th>Prayer</th><th>Weight</th><th>Key Win</th><th>Fix Next Week</th></tr></thead><tbody>'+tr+'</tbody></table></div>'
  +'<div class="pag"><button class="pgb" onclick="WKPG=Math.max(0,WKPG-1);goto(\'weekly\')" '+(WKPG===0?'disabled':'')+'>&#8249; Prev</button>'+pgBtns+'<button class="pgb" onclick="WKPG=Math.min('+(total-1)+',WKPG+1);goto(\'weekly\')" '+(WKPG>=total-1?'disabled':'')+'>Next &#8250;</button></div>';
}

function wireWk(){
  function wi(sel,f){qsa(sel).forEach(function(e){e.onblur=function(){var w=parseInt(this.dataset.wk);if(!DATA.weekly[w])DATA.weekly[w]={};DATA.weekly[w][f]=this.value;save();};});}
  wi('.wkwin','win');wi('.wkfail','fail');
}

// MUSIC PLAYER — Web Audio API ambient meditation tones
// ══════════════════════════════════════════════════════════════════════════
var audioCtx=null,musicPlaying=false,gainNode=null,oscillators=[];
var TRACKS=[
  {name:'Healing Solfeggio 528 Hz',freq:[528,264,132]},
  {name:'Deep Meditation 432 Hz',freq:[432,216,108]},
  {name:'Morning Energy 396 Hz',freq:[396,198,99]},
  {name:'Sleep & Peace 174 Hz',freq:[174,87,348]},
];
var curTrack=0;
function initAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  gainNode=audioCtx.createGain();gainNode.gain.value=0.08;
  gainNode.connect(audioCtx.destination);
}
function startMusic(){
  initAudio(); if(audioCtx.state==='suspended') audioCtx.resume();
  stopOscs();
  var tk=TRACKS[curTrack];
  tk.freq.forEach(function(f,i){
    var o=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    o.frequency.value=f; o.type=i===0?'sine':'triangle';
    g.gain.value=i===0?1:0.3-i*0.08;
    o.connect(g); g.connect(gainNode); o.start();
    oscillators.push({o:o,g:g});
  });
  musicPlaying=true; updateMusicUI();
}
function stopOscs(){oscillators.forEach(function(x){try{x.o.stop();}catch(e){}});oscillators=[];}
function stopMusic(){stopOscs();musicPlaying=false;updateMusicUI();}
function toggleMusic(){if(musicPlaying){stopMusic();}else{startMusic();}}
function nextTrack(){stopOscs();curTrack=(curTrack+1)%TRACKS.length;if(musicPlaying){startMusic();}updateMusicUI();}
function setVolume(v){if(gainNode){gainNode.gain.value=v/100*0.15;}}
function updateMusicUI(){
  var btn=el('music-play'); if(!btn) return;
  btn.innerHTML=musicPlaying?'<i class="fas fa-pause"></i>':'<i class="fas fa-play"></i>';
  var lbl=el('music-label'); if(lbl) lbl.innerHTML=(musicPlaying?'<span class="note-anim">♫</span> ':'♪ ')+TRACKS[curTrack].name;
}
