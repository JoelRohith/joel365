<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joel's 365-Day Master System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Rajdhani:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#07101f;--bg2:#0d1b2e;--gold:#f5a623;--gold2:#e8950f;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--violet:#8b5cf6;--amber:#f59e0b;--card:#0f1f35;--card2:#162840;--bdr:rgba(245,166,35,.15);--txt:#e8eaf0;--mut:#8a9ab5;--sw:265px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:3px}
#ptcl{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;border-radius:50%;opacity:0;animation:fup linear infinite}
@keyframes fup{0%{transform:translateY(100vh);opacity:0}15%{opacity:.4}85%{opacity:.15}100%{transform:translateY(-5vh);opacity:0}}
#sb{position:fixed;left:0;top:0;height:100vh;width:var(--sw);background:linear-gradient(180deg,#061525,#0b1e3a 60%,#061220);border-right:1px solid var(--bdr);z-index:200;display:flex;flex-direction:column;transition:transform .3s ease;overflow:hidden}
#sb.hide{transform:translateX(calc(-1 * var(--sw)))}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;cursor:pointer}
.sb-logo h1{font-family:'Cinzel',serif;font-size:.93rem;color:var(--gold);letter-spacing:1.5px;line-height:1.4}
.sb-logo p{font-size:.66rem;color:var(--mut);margin-top:3px;font-family:'Rajdhani'}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-sec{padding:9px 16px 2px;font-size:.6rem;color:rgba(138,154,181,.4);font-family:'Rajdhani';letter-spacing:2.5px;text-transform:uppercase;margin-top:4px}
.sb-a{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--mut);font-family:'Rajdhani';font-size:.88rem;font-weight:600;transition:all .15s;border-left:3px solid transparent;cursor:pointer;white-space:nowrap;user-select:none}
.sb-a:hover{color:var(--txt);background:rgba(245,166,35,.06)}
.sb-a.act{color:var(--gold);background:rgba(245,166,35,.1);border-left-color:var(--gold)}
.sb-a .ic{width:17px;text-align:center;font-size:.85rem;flex-shrink:0}
.sb-foot{padding:12px 16px;border-top:1px solid var(--bdr);font-size:.68rem;color:var(--mut);flex-shrink:0}
#tb{position:fixed;top:0;left:var(--sw);right:0;height:50px;background:rgba(7,16,31,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--bdr);z-index:199;display:flex;align-items:center;padding:0 18px;gap:12px;transition:left .3s ease}
#tb.full{left:0}
.mbtn{background:none;border:none;color:var(--gold);font-size:1.1rem;cursor:pointer;padding:5px 7px;border-radius:6px;transition:background .15s}
.mbtn:hover{background:rgba(245,166,35,.12)}
#tb-ttl{font-family:'Cinzel',serif;font-size:.9rem;color:#ffd580;font-weight:500;flex:1}
.daybdg{background:linear-gradient(135deg,var(--gold2),var(--amber));color:#000;font-family:'Rajdhani';font-size:.78rem;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}
#main{margin-left:var(--sw);margin-top:50px;min-height:calc(100vh - 50px);transition:margin-left .3s ease;position:relative;z-index:1}
#main.full{margin-left:0}
.pg{animation:pin .3s ease}
@keyframes pin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero{position:relative;overflow:hidden;display:flex;align-items:flex-end;min-height:200px}
.hbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.2) saturate(1.3)}
.hov{position:absolute;inset:0;background:linear-gradient(160deg,rgba(7,16,31,.94) 0%,rgba(15,31,53,.65) 60%,rgba(7,16,31,.9) 100%)}
.hc{position:relative;z-index:2;padding:38px 32px 34px;width:100%}
.hey{font-family:'Rajdhani';font-size:.76rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.hh{font-family:'Cinzel',serif;font-size:clamp(1.3rem,3.5vw,2.3rem);font-weight:900;color:#fff;line-height:1.2;margin-bottom:10px}
.hh span{color:var(--gold)}
.hsub{font-size:.83rem;color:var(--mut);max-width:440px;line-height:1.7;margin-bottom:20px}
.hstats{display:flex;gap:22px;flex-wrap:wrap}
.hsv{font-family:'Cinzel',serif;font-size:1.65rem;color:var(--gold);font-weight:700;line-height:1}
.hsl{font-size:.65rem;color:var(--mut);font-family:'Rajdhani';text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.sh{padding:20px 26px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sh h2{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold)}
.divg{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:6px 26px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;padding:18px 26px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;cursor:pointer;transition:transform .28s,box-shadow .28s}
.card:hover{transform:translateY(-5px);box-shadow:0 18px 50px rgba(245,166,35,.1)}
.card img{width:100%;height:135px;object-fit:cover;display:block;filter:brightness(.78);transition:filter .3s}
.card:hover img{filter:brightness(.9)}
.cb{padding:13px 15px}
.cico{font-size:1.2rem;margin-bottom:5px}
.ct{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);margin-bottom:3px}
.cd{font-size:.73rem;color:var(--mut);line-height:1.5}
.pbar{margin-top:9px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold2),var(--green))}
.tcg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:11px}
.tci{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:8px 10px;cursor:pointer;transition:all .15s;user-select:none}
.tci:hover{border-color:rgba(245,166,35,.3)}
.tci.dn{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.28)}
.tci.dn .tlbl{color:var(--green)}
.twrap{padding:13px 26px;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.79rem}
th{background:var(--card2);color:var(--gold);font-family:'Rajdhani';font-weight:700;padding:8px 10px;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap;font-size:.73rem;position:sticky;top:0;z-index:1}
td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--txt);vertical-align:middle}
tr:hover td{background:rgba(245,166,35,.02)}
.otr td{border-left:3px solid var(--amber)}
.ntr td{border-left:3px solid var(--blue)}
.mtr td{border-left:3px solid var(--violet)}
.cbw{text-align:center}
.ck{width:22px;height:22px;border:2px solid rgba(255,255,255,.18);border-radius:6px;background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-size:.78rem;color:transparent;user-select:none;flex-shrink:0}
.ck:hover{border-color:var(--green)}
.ck.on{background:var(--green);border-color:var(--green);color:#fff;animation:pop .2s ease}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}
.inp{background:var(--card2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);padding:5px 8px;font-family:'Nunito';font-size:.77rem;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}
.pag{display:flex;align-items:center;justify-content:center;gap:6px;padding:15px;flex-wrap:wrap}
.pgb{background:var(--card2);border:1px solid var(--bdr);color:var(--txt);padding:5px 10px;border-radius:7px;cursor:pointer;font-family:'Rajdhani';font-size:.78rem;font-weight:600;transition:all .15s}
.pgb:hover{background:var(--gold2);color:#000;border-color:var(--gold)}
.pgb.cur{background:var(--gold);color:#000;border-color:var(--gold)}
.pgb[disabled]{opacity:.3;cursor:not-allowed;pointer-events:none}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:15px;padding:15px 26px}
.mc{background:var(--card);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;transition:transform .28s}
.mc:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.4)}
.mc img{width:100%;height:160px;object-fit:cover;filter:brightness(.82)}
.mcb{padding:14px}
.tl{padding:20px 26px;position:relative}
.tl::before{content:'';position:absolute;left:44px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),var(--green),var(--blue))}
.tli{display:flex;gap:16px;margin-bottom:26px}
.tlico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;flex-shrink:0;z-index:1;margin-top:4px;border:2px solid currentColor}
.tlb{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:15px;transition:transform .2s}
.tlb:hover{transform:translateX(4px)}
.phg{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:15px;padding:15px 26px}
.phc{border-radius:13px;overflow:hidden;border:1px solid var(--bdr);transition:transform .28s}
.phc:hover{transform:translateY(-4px)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:12px;padding:13px 26px}
.fc{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:13px;transition:transform .2s}
.fc:hover{transform:translateY(-3px)}
.oilw{padding:11px 26px}
.oils{display:flex;gap:12px;padding:12px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;margin-bottom:9px;transition:transform .2s}
.oils:hover{transform:translateX(4px)}
.oiln{width:28px;height:28px;border-radius:50%;background:var(--gold2);color:#000;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:.8rem;flex-shrink:0;margin-top:2px}
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:15px;padding:15px 26px}
.qc{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:22px;position:relative;overflow:hidden;transition:transform .28s}
.qc:hover{transform:translateY(-4px)}
.qc::before{content:'"';position:absolute;top:-16px;left:11px;font-size:7rem;color:rgba(245,166,35,.05);font-family:'Cinzel',serif;line-height:1;pointer-events:none}
.hwk{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:12px 26px}
.hwd{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 7px;text-align:center;transition:transform .2s}
.hwd:hover{transform:translateY(-3px)}
.hwd.sp{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.04)}
.mcag{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:15px;padding:15px 26px}
.mcac{background:var(--card);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;transition:transform .28s}
.mcac:hover{transform:translateY(-4px)}
.trc{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:13px;margin-bottom:10px;transition:transform .2s}
.trc:hover{transform:translateX(4px)}
.ib{margin:13px 26px;padding:12px 16px;background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:10px}
.chwrap{padding:16px 26px}
.chbox{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:17px}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.68rem;font-family:'Rajdhani';font-weight:700}
.bg{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.25)}
.bge{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.bgr{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.bgb{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.bgv{background:rgba(139,92,246,.1);color:var(--violet);border:1px solid rgba(139,92,246,.25)}
.bga{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
@media(max-width:768px){#sb{transform:translateX(calc(-1 * var(--sw)))}#sb.open{transform:translateX(0)!important}#main,#tb{margin-left:0!important;left:0!important}#tb{left:0}.hwk{grid-template-columns:repeat(3,1fr)}.hc{padding:26px 18px 22px}}
@media(max-width:480px){.cgrid,.mgrid,.phg,.fgrid,.mcag{grid-template-columns:1fr}.tcg{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="ptcl"></div>
<nav id="sb">
  <div class="sb-logo" onclick="goto('dashboard')">
    <h1>JOEL'S 365<br>MASTER SYSTEM</h1>
    <p>20-March-2026 &#x2192; 19-March-2027</p>
  </div>
  <div class="sb-nav" id="sbnav"></div>
  <div class="sb-foot"><span id="sbday" style="color:var(--gold);font-family:'Rajdhani';font-size:.8rem;font-weight:700">Day 1 of 365</span><br>All data saved in your browser</div>
</nav>
<header id="tb">
  <button class="mbtn" onclick="toggleSB()"><i class="fas fa-bars" id="mico"></i></button>
  <span id="tb-ttl">Dashboard</span>
  <span class="daybdg" id="tbday">Day 1</span>
</header>
<main id="main"><div style="color:var(--mut);padding:40px;font-family:'Rajdhani'">Loading...</div></main>

<script>
// ── Data generation (all done in JS — no JSON parse issues) ────────────────
var BOOKS=[['Genesis',50],['Exodus',40],['Leviticus',27],['Numbers',36],['Deuteronomy',34],
['Joshua',24],['Judges',21],['Ruth',4],['1 Samuel',31],['2 Samuel',24],
['1 Kings',22],['2 Kings',25],['1 Chronicles',29],['2 Chronicles',36],
['Ezra',10],['Nehemiah',13],['Esther',10],['Job',42],['Psalms',150],
['Proverbs',31],['Ecclesiastes',12],['Song of Solomon',8],['Isaiah',66],
['Jeremiah',52],['Lamentations',5],['Ezekiel',48],['Daniel',12],
['Hosea',14],['Joel',3],['Amos',9],['Obadiah',1],['Jonah',4],
['Micah',7],['Nahum',3],['Habakkuk',3],['Zephaniah',3],['Haggai',2],
['Zechariah',14],['Malachi',4],
['Matthew',28],['Mark',16],['Luke',24],['John',21],['Acts',28],
['Romans',16],['1 Corinthians',16],['2 Corinthians',13],['Galatians',6],
['Ephesians',6],['Philippians',4],['Colossians',4],['1 Thessalonians',5],
['2 Thessalonians',3],['1 Timothy',6],['2 Timothy',4],['Titus',3],
['Philemon',1],['Hebrews',13],['James',5],['1 Peter',5],['2 Peter',3],
['1 John',5],['2 John',1],['3 John',1],['Jude',1],['Revelation',22]];

var OT_COUNT=39;
var OT_NAMES={};
for(var _i=0;_i<OT_COUNT;_i++) OT_NAMES[BOOKS[_i][0]]=1;

// Build flat chapters list
var ALL_CH=[];
for(var bi=0;bi<BOOKS.length;bi++){
  for(var ci=1;ci<=BOOKS[bi][1];ci++) ALL_CH.push([BOOKS[bi][0],ci]);
}

// Build 365-day plan
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS_IN_MONTH=[31,28,31,30,31,30,31,31,30,31,30,31];

function addDays(year,month,day,n){
  // month is 0-indexed
  var d=new Date(year,month,day);
  d.setDate(d.getDate()+n);
  return d;
}

function fmtDate(d){
  var day=d.getDate();
  var m=MONTHS[d.getMonth()];
  var y=d.getFullYear();
  return (day<10?'0':'')+day+'-'+m+'-'+y;
}

var START=new Date(2026,2,20); // March 20 2026

function chLabel(chs){
  if(!chs||!chs.length) return '';
  var g=[],cb=chs[0][0],s=chs[0][1],e=chs[0][1];
  for(var i=1;i<chs.length;i++){
    if(chs[i][0]===cb&&chs[i][1]===e+1){e=chs[i][1];}
    else{g.push([cb,s,e]);cb=chs[i][0];s=e=chs[i][1];}
  }
  g.push([cb,s,e]);
  return g.map(function(x){return x[1]===x[2]?x[0]+' '+x[1]:x[0]+' '+x[1]+'-'+x[2];}).join(' | ');
}

var BIBLE_PLAN=[];
var ALL_DATES=[];
var base=Math.floor(1189/365), extra=1189%365, idx=0;
for(var day=0;day<365;day++){
  var cnt=base+(day<extra?1:0);
  var chs=ALL_CH.slice(idx,idx+cnt); idx+=cnt;
  var dt=addDays(2026,2,20,day);
  ALL_DATES.push(fmtDate(dt));
  var books=[]; var bk_seen={};
  for(var ci=0;ci<chs.length;ci++){if(!bk_seen[chs[ci][0]]){books.push(chs[ci][0]);bk_seen[chs[ci][0]]=1;}}
  var is_ot=OT_NAMES[chs[0][0]]?1:0;
  var has_nt=0; for(var ci=0;ci<chs.length;ci++){if(!OT_NAMES[chs[ci][0]]){has_nt=1;break;}}
  var test=is_ot&&has_nt?'OT+NT':is_ot?'OT':'NT';
  BIBLE_PLAN.push({day:day+1,date:fmtDate(dt),reading:chLabel(chs),testament:test,books:books});
}

function wtgt(d){
  if(d<90) return Math.round((86-(20/90)*d)*10)/10;
  if(d<180) return Math.round((66-(6/90)*(d-90))*10)/10;
  return 60.0;
}

// ── Storage ────────────────────────────────────────────────────────────────
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
var DATA=lsGet('joel_v5')||{daily:{},bible:{},weight:{},weekly:{}};
function save(){lsSet('joel_v5',DATA);}

// ── Helpers ────────────────────────────────────────────────────────────────
function el(id){return document.getElementById(id);}
function qsa(s){return Array.prototype.slice.call(document.querySelectorAll(s));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getDN(){var ms=new Date()-START;var d=Math.floor(ms/86400000)+1;return Math.max(1,Math.min(365,d));}
function today(){return ALL_DATES[Math.min(getDN()-1,364)];}
function hst(v,l){return '<div><div class="hsv">'+v+'</div><div class="hsl">'+l+'</div></div>';}
function hero(ey,ti,sub,img,stats,mh){
  return '<div class="hero" style="min-height:'+(mh||'190px')+'">'
    +'<div class="hbg" style="background-image:url(\''+img+'\')"></div>'
    +'<div class="hov"></div><div class="hc">'
    +'<div class="hey">'+ey+'</div><div class="hh">'+ti+'</div>'
    +(sub?'<div class="hsub">'+sub+'</div>':'')
    +(stats?'<div class="hstats">'+stats+'</div>':'')
    +'</div></div>';
}

// ── NAV ────────────────────────────────────────────────────────────────────
var NAV=[
  {sec:'Overview'},
  {id:'dashboard',ico:'fa-house',lbl:'Dashboard'},
  {sec:'Health & Fitness'},
  {id:'daily',ico:'fa-calendar-check',lbl:'Daily Tracker'},
  {id:'workout',ico:'fa-dumbbell',lbl:'Workout Plan'},
  {id:'diet',ico:'fa-utensils',lbl:'Diet Plan'},
  {id:'weight',ico:'fa-weight-scale',lbl:'Weight Tracker'},
  {id:'hair',ico:'fa-hand-sparkles',lbl:'Hair Restoration'},
  {id:'hm',ico:'fa-brain',lbl:'Healthy Mind'},
  {sec:'Career & Study'},
  {id:'career',ico:'fa-laptop-code',lbl:'Career Roadmap'},
  {id:'mca',ico:'fa-graduation-cap',lbl:'MCA Study Plan'},
  {sec:'Spirit & Review'},
  {id:'bible',ico:'fa-book-open',lbl:'Bible Reading'},
  {id:'spiritual',ico:'fa-cross',lbl:'Spiritual Tracker'},
  {id:'weekly',ico:'fa-chart-bar',lbl:'Weekly Review'},
  {id:'motivation',ico:'fa-fire',lbl:'Motivation Board'}
];
var PT={dashboard:'Dashboard',daily:'Daily Tracker',career:'Career Roadmap',diet:'Diet Plan',workout:'Workout Plan',weight:'Weight Tracker',mca:'MCA Study Plan',bible:'Bible Reading Plan',hm:'Healthy Mind',hair:'Hair Restoration',weekly:'Weekly Review',spiritual:'Spiritual Tracker',motivation:'Motivation Board'};

var sbOpen=true;
function toggleSB(){
  var sb=el('sb'),mn=el('main'),tb=el('tb');
  if(window.innerWidth<=768){sb.classList.toggle('open');}
  else{sbOpen=!sbOpen;sb.classList.toggle('hide',!sbOpen);mn.classList.toggle('full',!sbOpen);tb.classList.toggle('full',!sbOpen);}
}

function buildNav(act){
  var h='',dn=getDN();
  for(var i=0;i<NAV.length;i++){
    var n=NAV[i];
    if(n.sec){h+='<div class="sb-sec">'+n.sec+'</div>';}
    else{h+='<div class="sb-a'+(act===n.id?' act':'')+'" onclick="goto(\''+n.id+'\')">'+'<span class="ic"><i class="fas '+n.ico+'"></i></span>'+n.lbl+'</div>';}
  }
  var sbn=el('sbnav'); if(sbn) sbn.innerHTML=h;
  var sd=el('sbday'); if(sd) sd.textContent='Day '+dn+' of 365';
  var td=el('tbday'); if(td) td.textContent='Day '+dn;
}

var CUR='';
function goto(page){
  CUR=page;
  var ttl=el('tb-ttl'); if(ttl) ttl.textContent=PT[page]||page;
  buildNav(page);
  if(window.innerWidth<=768){var sb=el('sb');if(sb)sb.classList.remove('open');}
  var main=el('main');
  if(!main) return;
  main.innerHTML='<div class="pg" id="pgcont"></div>';
  var cont=el('pgcont');
  if(!cont) return;
  try{
    if(page==='dashboard') cont.innerHTML=pgDash();
    else if(page==='daily') cont.innerHTML=pgDaily();
    else if(page==='career') cont.innerHTML=pgCareer();
    else if(page==='diet') cont.innerHTML=pgDiet();
    else if(page==='workout') cont.innerHTML=pgWorkout();
    else if(page==='weight') cont.innerHTML=pgWeight();
    else if(page==='mca') cont.innerHTML=pgMCA();
    else if(page==='bible') cont.innerHTML=pgBible();
    else if(page==='hm') cont.innerHTML=pgHM();
    else if(page==='hair') cont.innerHTML=pgHair();
    else if(page==='weekly') cont.innerHTML=pgWeekly();
    else if(page==='spiritual') cont.innerHTML=pgSpiritual();
    else if(page==='motivation') cont.innerHTML=pgMotivation();
  }catch(e){cont.innerHTML='<div style="padding:30px;color:var(--red);font-family:Rajdhani">JS Error: '+e.message+'<br><small>'+e.stack+'</small></div>';}
  wire(page);
  window.scrollTo(0,0);
}

function wire(page){
  qsa('.gp').forEach(function(e){e.onclick=function(){goto(this.dataset.p);};});
  if(page==='daily') wireDly();
  if(page==='weight') wireWt();
  if(page==='bible'||page==='spiritual') wireBible();
  if(page==='weekly') wireWk();
}

var DW=0;
function pgDaily(){
  var dn=getDN(),tw=Math.ceil(365/7),td=today();

    var cbs='';

      +'<td style="font-family:Rajdhani;font-weight:700;white-space:nowrap;font-size:.76rem;color:'+(isT?'var(--gold)':'var(--txt)')+'">'+date+'</td>'
      +cbs

      +'<td><input class="inp dnote" data-date="'+date+'" style="min-width:115px" placeholder="Note..." value="'+esc(d.note||'')+'"></td>'
      +'</tr>';
  }

    'https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=1200&q=80','','145px')
  +'<div style="padding:13px 26px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
  +'<button class="pgb" onclick="DW=0;goto(\'daily\')" '+(DW===0?'disabled':'')+'>&#171;</button>'

  +'<span style="font-family:Cinzel,serif;color:var(--gold);font-size:.82rem">Week '+(DW+1)+' of '+tw+'</span>'
  +'<button class="pgb" onclick="DW=Math.min('+(tw-1)+',DW+1);goto(\'daily\')" '+(DW>=tw-1?'disabled':'')+'>Next &#8250;</button>'

}

function wireDly(){
  qsa('.ck').forEach(function(e){
    e.onclick=function(){
      var date=this.dataset.date,key=this.dataset.key;
      if(!DATA.daily[date]) DATA.daily[date]={};
      DATA.daily[date][key]=!DATA.daily[date][key];
      save(); this.classList.toggle('on');
    };
  });
  qsa('.dnote').forEach(function(e){
    e.onblur=function(){
      if(!DATA.daily[this.dataset.date]) DATA.daily[this.dataset.date]={};
      DATA.daily[this.dataset.date].note=this.value; save();
    };
  });
}

var WP=0,WPER=30;
function pgWeight(){
  var total=Math.ceil(365/WPER);
  var rows=[];
  for(var i=WP*WPER;i<Math.min((WP+1)*WPER,365);i++) rows.push(i);
  var tr='';
  for(var i=0;i<rows.length;i++){
    var idx=rows[i],r={date:ALL_DATES[idx],day:idx+1,target:wtgt(idx),phase:idx<90?1:idx<180?2:3};
    var actual=DATA.weight[r.date]||'';
    var diff=actual!==''?Math.round((parseFloat(actual)-r.target)*10)/10:'';
    var pb=r.phase===1?'bgr':r.phase===2?'bga':'bge';
    var dc=diff>0?'var(--red)':diff<0?'var(--green)':'var(--mut)';
    tr+='<tr><td style="font-family:Rajdhani;font-weight:600;white-space:nowrap;font-size:.76rem">'+r.date+'</td>'
      +'<td style="color:var(--mut)">'+r.day+'</td>'

      +'<td style="color:var(--blue)">'+r.target+'</td>'
      +'<td><input class="inp winp" data-date="'+r.date+'" type="number" step="0.1" placeholder="&mdash;" style="width:70px;text-align:center" value="'+esc(actual)+'"></td>'
      +'<td style="color:'+dc+'">'+( diff!==''?(diff>0?'+':'')+diff : '')+'</td></tr>';
  }
  var pgBtns='';
  for(var i=0;i<total;i++) pgBtns+='<button class="pgb'+(i===WP?' cur':'')+'" onclick="WP='+i+';goto(\'weight\')">'+(i*WPER+1)+'-'+Math.min((i+1)*WPER,365)+'</button>';
  return hero('3-Phase Journey','Weight <span>Tracker</span>',
    'Phase 1: 86&rarr;66 kg (90d) &bull; Phase 2: 66&rarr;60 kg (90d) &bull; Phase 3: Maintain 60 kg',
    'https://images.unsplash.com/photo-1534258936925-c58bed479fcb?w=1200&q=80','','145px')
  +'<div class="chwrap"><div class="chbox">'
  +'<div style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:13px;font-size:.88rem">Weight Journey &mdash; Weekly Overview</div>'

  +'<div style="display:flex;gap:8px;padding:0 26px 11px;flex-wrap:wrap">'
  +'<span class="bdg bgr">&#x1F534; Phase 1: 86&rarr;66 kg</span>'
  +'<span class="bdg bga">&#x1F7E0; Phase 2: 66&rarr;60 kg</span>'
  +'<span class="bdg bge">&#x1F7E2; Phase 3: Maintain 60 kg</span></div>'
  +'<div class="twrap"><table><thead><tr><th>Date</th><th>Day</th><th>Phase</th><th>Target kg</th><th>Actual kg</th><th>Diff</th></tr></thead><tbody>'+tr+'</tbody></table></div>'
  +'<div class="pag"><button class="pgb" onclick="WP=Math.max(0,WP-1);goto(\'weight\')" '+(WP===0?'disabled':'')+'>&#8249; Prev</button>'+pgBtns+'<button class="pgb" onclick="WP=Math.min('+(total-1)+',WP+1);goto(\'weight\')" '+(WP>=total-1?'disabled':'')+'>Next &#8250;</button></div>';

function wireWt(){

// ══════════════════════════════════════════════════════════════════════
var WKPG=0,WKPER=13;
function pgWeekly(){
  var total=Math.ceil(52/WKPER);
  var weeks=[];
  for(var i=0;i<52;i++){
    var s=new Date(2026,2,20); s.setDate(s.getDate()+i*7);
    var e=new Date(s); e.setDate(e.getDate()+6);
    weeks.push({w:i+1,s:s.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}),e:e.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})});
  }
  var slice=weeks.slice(WKPG*WKPER,(WKPG+1)*WKPER);
  var tr='';
  for(var i=0;i<slice.length;i++){
    var r=slice[i],d=DATA.weekly[r.w]||{};
    var sc=parseFloat(d.score)||0;
    var scC=sc>=8?'var(--green)':sc>=5?'var(--amber)':'var(--red)';
    tr+='<tr><td style="font-family:Cinzel,serif;color:var(--gold);font-weight:700">W'+r.w+'</td>'
      +'<td style="font-size:.74rem;white-space:nowrap">'+r.s+' &ndash; '+r.e+'</td>'
      +'<td><input class="inp wksc" data-wk="'+r.w+'" type="number" min="0" max="10" step="0.5" style="width:55px;text-align:center;color:'+scC+'" placeholder="&mdash;" value="'+esc(d.score||'')+'"></td>'
      +'<td><input class="inp wkwt" data-wk="'+r.w+'" style="width:80px" placeholder="e.g. -1.2kg" value="'+esc(d.wt||'')+'"></td>'
      +'<td><input class="inp wkwin" data-wk="'+r.w+'" style="min-width:100px" placeholder="Win..." value="'+esc(d.win||'')+'"></td>'
      +'<td><input class="inp wkfail" data-wk="'+r.w+'" style="min-width:100px" placeholder="Fail..." value="'+esc(d.fail||'')+'"></td>'
      +'<td><input class="inp wkfix" data-wk="'+r.w+'" style="min-width:110px" placeholder="Fix..." value="'+esc(d.fix||'')+'"></td>'
      +'</tr>';
  }
  var pgBtns='';
  for(var i=0;i<total;i++) pgBtns+='<button class="pgb'+(i===WKPG?' cur':'')+'" onclick="WKPG='+i+';goto(\'weekly\')">'+(i*WKPER+1)+'-'+Math.min((i+1)*WKPER,52)+'</button>';
  return hero('Every Sunday','Weekly <span>Review</span>','',
    'https://images.unsplash.com/photo-1606761568499-6d2451b23c66?w=1200&q=80','','135px')
  +'<div class="twrap"><table><thead><tr><th>Week</th><th>Dates</th><th>Score /10</th><th>Wt Change</th><th>Key Win</th><th>Key Fail</th><th>Fix Next Week</th></tr></thead><tbody>'+tr+'</tbody></table></div>'
  +'<div class="pag"><button class="pgb" onclick="WKPG=Math.max(0,WKPG-1);goto(\'weekly\')" '+(WKPG===0?'disabled':'')+'>&#8249; Prev</button>'+pgBtns+'<button class="pgb" onclick="WKPG=Math.min('+(total-1)+',WKPG+1);goto(\'weekly\')" '+(WKPG>=total-1?'disabled':'')+'>Next &#8250;</button></div>';
}

function wireWk(){
  function wi(sel,f){qsa(sel).forEach(function(e){e.onblur=function(){var w=parseInt(this.dataset.wk);if(!DATA.weekly[w])DATA.weekly[w]={};DATA.weekly[w][f]=this.value;save();};});}
  wi('.wksc','score');wi('.wkwt','wt');wi('.wkwin','win');wi('.wkfail','fail');wi('.wkfix','fix');
}
